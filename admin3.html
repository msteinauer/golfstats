<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GolfLog Admin v3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; font-family: 'Inter', system-ui, sans-serif; color: #f1f5f9; min-height: 100vh; padding: 20px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 13px; margin-bottom: 20px; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
    .btn-green { background: #166534; color: #4ade80; }
    .btn-green:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    .btn-red { background: #7f1d1d; color: #f87171; }
    .progress-bar { background: #1e293b; border-radius: 8px; height: 10px; margin: 10px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #166534, #4ade80); border-radius: 8px; transition: width 0.5s ease; }
    .stat { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .stat-val { font-weight: 800; color: #4ade80; }
    .log { background: #020617; border: 1px solid #1e293b; border-radius: 8px; padding: 10px; font-size: 11px; color: #64748b; height: 140px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; margin-top: 10px; }
    .state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; max-height: 380px; overflow-y: auto; }
    .state-item { padding: 7px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; display: flex; justify-content: space-between; }
    .s-pending { background: #1e293b; color: #64748b; }
    .s-active  { background: #1e3a5f; color: #60a5fa; }
    .s-done    { background: #0c2218; color: #4ade80; }
    .s-error   { background: #1c0a0a; color: #f87171; }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
    <span style="font-size:24px">⛳</span><h1>GolfLog Admin</h1>
  </div>
  <div class="subtitle">Download all US golf courses into Supabase</div>

  <div class="card">
    <div class="stat"><span>Courses Saved</span><span class="stat-val" id="totalSaved">—</span></div>
    <div class="stat"><span>States Done</span><span class="stat-val" id="statesDone">0 / 50</span></div>
    <div class="stat"><span>API Requests</span><span class="stat-val" id="requests">0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="bar" style="width:0%"></div></div>
    <button class="btn btn-green" id="startBtn" onclick="start()">⬇ Download All 50 States</button>
    <button class="btn" onclick="resetProgress()" style="background:#1e293b;color:#94a3b8;margin-bottom:8px">🔄 Reset & Start Fresh</button>
    <button class="btn btn-red" id="stopBtn" onclick="stop()" style="display:none">■ Stop</button>
    <div class="log" id="log">Ready. Tap Download to begin.
Searches "golf [state]" + "club [state]" for all 50 states.
Only ~100 API requests total — completes in one session!</div>
  </div>

  <div class="card">
    <div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:8px">STATE PROGRESS</div>
    <div class="state-grid" id="stateGrid"></div>
  </div>

  <script>
    const PROXY = "https://golfproxy.vercel.app";
    const STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

    let running = false;
    let totalSaved = 0;
    let totalRequests = 0;
    let statesDone = 0;

    // Build state grid
    const grid = document.getElementById("stateGrid");
    STATES.forEach(s => {
      const el = document.createElement("div");
      el.className = "state-item s-pending";
      el.id = "s-" + s.replace(/ /g,"_");
      el.innerHTML = `<span>${s}</span><span id="c-${s.replace(/ /g,"_")}">—</span>`;
      grid.appendChild(el);
    });

    // Load saved progress
    const savedIdx = parseInt(localStorage.getItem("golfadmin_idx") || "0");
    if (savedIdx > 0) {
      log(`Resuming from state ${savedIdx + 1} (${STATES[savedIdx]})`);
      // Mark completed states
      for (let i = 0; i < savedIdx; i++) {
        const key = STATES[i].replace(/ /g,"_");
        document.getElementById("s-" + key).className = "state-item s-done";
        document.getElementById("c-" + key).textContent = "✓";
      }
      statesDone = savedIdx;
      document.getElementById("statesDone").textContent = savedIdx + " / 50";
    }

    function log(msg) {
      const el = document.getElementById("log");
      el.textContent += "\n" + new Date().toLocaleTimeString() + " " + msg;
      el.scrollTop = el.scrollHeight;
    }

    function resetProgress() {
      // Clear ALL localStorage keys related to golf admin
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith("golfadmin")) localStorage.removeItem(k);
      });
      alert("Progress cleared! Page will reload.");
      location.reload();
    }

    function stop() {
      running = false;
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").style.display = "none";
      log("⏹ Stopped — progress saved.");
    }

    async function checkTotal() {
      try {
        const res = await fetch(`https://koingualzctoyulzytxb.supabase.co/rest/v1/courses?select=id&apikey=sb_publishable_hjbdLga6ndmIsiq7jIdXGw_weKPNIQV`);
        const data = await res.json();
        document.getElementById("totalSaved").textContent = data.length.toLocaleString();
      } catch {}
    }

    async function start() {
      running = true;
      document.getElementById("startBtn").disabled = true;
      document.getElementById("stopBtn").style.display = "block";

      const startIdx = 0; // Always start from beginning
      log(`🚀 Starting from state ${startIdx + 1}: ${STATES[startIdx]}`);

      for (let i = startIdx; i < STATES.length; i++) {
        if (!running) break;

        const state = STATES[i];
        const key = state.replace(/ /g, "_");
        document.getElementById("s-" + key).className = "state-item s-active";
        log(`📥 ${state}...`);

        try {
          const res = await fetch(`${PROXY}/api/download?state=${encodeURIComponent(state)}`);
          const data = await res.json();

          if (data.rate_limited || (data.results && data.results[0]?.rate_limited)) {
            document.getElementById("s-" + key).className = "state-item s-error";
            log(`⚠️ Rate limited on ${state}. Resume tomorrow.`);
            localStorage.setItem("golfadmin_idx", i);
            running = false;
            break;
          }

          const found = data.found || data.total_found || data.results?.[0]?.found || 0;
          const reqs = data.requests || data.requests_used || 0;
          totalSaved += found;
          totalRequests += reqs;
          statesDone = i + 1;

          document.getElementById("s-" + key).className = "state-item s-done";
          document.getElementById("c-" + key).textContent = found + " ✓";
          document.getElementById("statesDone").textContent = statesDone + " / 50";
          document.getElementById("requests").textContent = totalRequests.toLocaleString();
          document.getElementById("bar").style.width = (statesDone / 50 * 100) + "%";

          log(`✓ ${state}: ${found} courses, ${reqs} requests`);
          localStorage.setItem("golfadmin_idx", i + 1);

          // Check actual DB total every 5 states
          if (statesDone % 5 === 0) await checkTotal();

          await new Promise(r => setTimeout(r, 400));
        } catch (e) {
          document.getElementById("s-" + key).className = "state-item s-error";
          log(`✗ ${state}: ${e.message}`);
        }
      }

      if (running) {
        await checkTotal();
        log(`🎉 All 50 states complete!`);
        localStorage.removeItem("golfadmin_idx");
      }

      running = false;
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").style.display = "none";
    }
  </script>
</body>
</html>
