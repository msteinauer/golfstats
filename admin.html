<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GolfLog Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; font-family: 'Inter', system-ui, sans-serif; color: #f1f5f9; min-height: 100vh; padding: 20px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 13px; margin-bottom: 24px; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .btn-green { background: #166534; color: #4ade80; }
    .btn-green:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    .btn-red { background: #7f1d1d; color: #f87171; margin-top: 8px; }
    .progress-bar { background: #1e293b; border-radius: 8px; height: 10px; margin: 12px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #4ade80; border-radius: 8px; transition: width 0.4s ease; }
    .state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; max-height: 400px; overflow-y: auto; }
    .state-item { padding: 8px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    .state-pending { background: #1e293b; color: #64748b; }
    .state-loading { background: #1e3a5f; color: #60a5fa; }
    .state-done { background: #0c2218; color: #4ade80; }
    .state-error { background: #1c0a0a; color: #f87171; }
    .stat { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .stat-val { font-weight: 700; color: #4ade80; }
    .log { background: #020617; border: 1px solid #1e293b; border-radius: 8px; padding: 10px; font-size: 11px; color: #64748b; max-height: 150px; overflow-y: auto; margin-top: 10px; font-family: monospace; }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
    <span style="font-size:24px">⛳</span>
    <h1>GolfLog Admin</h1>
  </div>
  <div class="subtitle">Download all US golf courses into Supabase</div>

  <div class="card">
    <div class="stat"><span>Total courses saved</span><span class="stat-val" id="totalSaved">0</span></div>
    <div class="stat"><span>States completed</span><span class="stat-val" id="statesComplete">0 / 50</span></div>
    <div class="stat"><span>API requests used</span><span class="stat-val" id="requestsUsed">0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    <button class="btn btn-green" id="startBtn" onclick="startDownload()">⬇ Download All 50 States</button>
    <button class="btn btn-red" id="stopBtn" onclick="stopDownload()" style="display:none">■ Stop</button>
    <div class="log" id="log">Ready to download...</div>
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#94a3b8">STATE PROGRESS</div>
    <div class="state-grid" id="stateGrid"></div>
  </div>

  <script>
    const PROXY = "https://golfproxy.vercel.app";

    const US_STATES = [
      ["Alabama","AL"],["Alaska","AK"],["Arizona","AZ"],["Arkansas","AR"],["California","CA"],
      ["Colorado","CO"],["Connecticut","CT"],["Delaware","DE"],["Florida","FL"],["Georgia","GA"],
      ["Hawaii","HI"],["Idaho","ID"],["Illinois","IL"],["Indiana","IN"],["Iowa","IA"],
      ["Kansas","KS"],["Kentucky","KY"],["Louisiana","LA"],["Maine","ME"],["Maryland","MD"],
      ["Massachusetts","MA"],["Michigan","MI"],["Minnesota","MN"],["Mississippi","MS"],["Missouri","MO"],
      ["Montana","MT"],["Nebraska","NE"],["Nevada","NV"],["New Hampshire","NH"],["New Jersey","NJ"],
      ["New Mexico","NM"],["New York","NY"],["North Carolina","NC"],["North Dakota","ND"],["Ohio","OH"],
      ["Oklahoma","OK"],["Oregon","OR"],["Pennsylvania","PA"],["Rhode Island","RI"],["South Carolina","SC"],
      ["South Dakota","SD"],["Tennessee","TN"],["Texas","TX"],["Utah","UT"],["Vermont","VT"],
      ["Virginia","VA"],["Washington","WA"],["West Virginia","WV"],["Wisconsin","WI"],["Wyoming","WY"]
    ];

    let running = false;
    let totalSaved = 0;
    let totalRequests = 0;
    let statesComplete = 0;
    const stateStatus = {};

    // Build state grid
    const grid = document.getElementById("stateGrid");
    US_STATES.forEach(([name, abbr]) => {
      stateStatus[abbr] = "pending";
      const el = document.createElement("div");
      el.className = "state-item state-pending";
      el.id = "state-" + abbr;
      el.innerHTML = `<span>${name}</span><span id="count-${abbr}">—</span>`;
      grid.appendChild(el);
    });

    function log(msg) {
      const el = document.getElementById("log");
      el.innerHTML += "\n" + new Date().toLocaleTimeString() + " " + msg;
      el.scrollTop = el.scrollHeight;
    }

    function updateState(abbr, status, count) {
      const el = document.getElementById("state-" + abbr);
      el.className = "state-item state-" + status;
      if (count !== undefined) {
        document.getElementById("count-" + abbr).textContent = count + " courses";
      }
    }

    function updateStats() {
      document.getElementById("totalSaved").textContent = totalSaved.toLocaleString();
      document.getElementById("statesComplete").textContent = statesComplete + " / 50";
      document.getElementById("requestsUsed").textContent = totalRequests.toLocaleString();
      document.getElementById("progressBar").style.width = (statesComplete / 50 * 100) + "%";
    }

    function stopDownload() {
      running = false;
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").style.display = "none";
      log("⏹ Download stopped.");
    }

    async function startDownload() {
      running = true;
      document.getElementById("startBtn").disabled = true;
      document.getElementById("stopBtn").style.display = "block";
      log("🚀 Starting download of all 50 states...");

      for (const [stateName, stateAbbr] of US_STATES) {
        if (!running) break;

        updateState(stateAbbr, "loading");
        log(`📥 Downloading ${stateName}...`);

        try {
          const res = await fetch(`${PROXY}/api/download?state=${encodeURIComponent(stateName)}`);
          const data = await res.json();

          if (data.rate_limited) {
            updateState(stateAbbr, "error", 0);
            log(`⚠️ Rate limited on ${stateName} — stopping. Resume tomorrow.`);
            running = false;
            break;
          }

          totalSaved += data.found || 0;
          totalRequests += data.requests_used || 0;
          statesComplete++;
          updateState(stateAbbr, "done", data.found || 0);
          log(`✓ ${stateName}: ${data.found} courses saved`);
          updateStats();

          // Small pause between states
          await new Promise(r => setTimeout(r, 500));
        } catch (e) {
          updateState(stateAbbr, "error");
          log(`✗ ${stateName}: ${e.message}`);
        }
      }

      if (running) {
        log(`🎉 Complete! ${totalSaved} total courses saved across ${statesComplete} states.`);
      }
      running = false;
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").style.display = "none";
    }
  </script>
</body>
</html>
