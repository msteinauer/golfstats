<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1b2d" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>GolfLog v44</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text); transition: background 0.2s; }
    /* ── Theme variables ────────────────────────────────────────── */
    :root {
      --bg: #0f1b2d;          /* app background */
      --surface: #1a2942;     /* cards */
      --surface2: #26395a;    /* inputs, buttons, chips */
      --surface3: #16213a;    /* subtle insets */
      --border: #3d5478;      /* borders */
      --text: #f1f5f9;        /* primary text */
      --text2: #cbd5e1;       /* secondary text */
      --text3: #94a3b8;       /* muted text */
      --text4: #7c8db0;       /* faint text */
      --surface-blue: #1e3a5f;
      --shadow: rgba(0,0,0,0.4);
    }
    body.light {
      --bg: #eef2f7;
      --surface: #ffffff;
      --surface2: #e7edf3;
      --surface3: #f1f5f9;
      --border: #cbd5e1;
      --text: #0f172a;
      --text2: #334155;
      --text3: #64748b;
      --text4: #94a3b8;
      --surface-blue: #dbeafe;
      --shadow: rgba(0,0,0,0.12);
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    input, button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff; color: #000; }
      .print-card { background: #f8f8f8 !important; border: 1px solid #ccc !important; color: #000 !important; }
      .print-label { color: #555 !important; }
      .print-value { color: #000 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Static course data (replaces Supabase) ────────────────────────
    // courses-index.json: lightweight array for search/browse: {id, n, cn, c, s, co, h}
    // tees/{bucket}.json: full tee data keyed by course id, bucket = floor(id/500)
    const COURSES_INDEX_URL = "./courses-index.json";
    const TEE_BUCKET_SIZE = 500;
    let _courseIndexPromise = null;
    const _teeBucketCache = {}; // bucket number -> parsed object (in-memory, per session only)

    function loadCourseIndex() {
      if (!_courseIndexPromise) {
        _courseIndexPromise = fetch(COURSES_INDEX_URL)
          .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
          .catch(err => { _courseIndexPromise = null; throw err; });
      }
      return _courseIndexPromise;
    }

    async function loadTeeBucket(bucket) {
      if (_teeBucketCache[bucket]) return _teeBucketCache[bucket];
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 12000); // give up after 12s
      try {
        const res = await fetch(`./tees/${bucket}.json`, { signal: controller.signal });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        _teeBucketCache[bucket] = data;
        return data;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    // Returns tees object for a course id, or {} if not found
    async function getCourseTees(id) {
      const bucket = Math.floor(id / TEE_BUCKET_SIZE);
      try {
        const data = await loadTeeBucket(bucket);
        const entry = data[id] || data[String(id)];
        return (entry && entry.tees) || {};
      } catch {
        return {};
      }
    }

    const HOLES = Array.from({ length: 18 }, (_, i) => i + 1);
    const PAR_OPTIONS = [3, 4, 5];

    const defaultHole = () => ({
      par: 4, yardage: null, score: "", putts: "", chips: "",
      fairway: null, gir: null,
      chgsScore: "", chgsFairway: null,
      greenPlus80: null, greenMinus80: null,
      upAndDown: null, chgsPutts: "",
    });

    const defaultRound = () => ({
      course: "",
      tee: "",
      date: new Date().toISOString().split("T")[0],
      holes: HOLES.map(() => defaultHole()),
    });

    // ── Encode/decode round to/from URL ──────────────────────────────
    function encodeRound(round) {
      try { return btoa(JSON.stringify(round)); } catch { return ""; }
    }
    function decodeRound(str) {
      try { return JSON.parse(atob(str)); } catch { return null; }
    }

    // ── Export all rounds as JSON file ──────────────────────────────
    function exportAllRounds(rounds) {
      try {
        // Back up everything: rounds, favorites, and custom courses
        let favorites = [], customCourses = [];
        try { favorites = JSON.parse(localStorage.getItem("golflog_favorites")) || []; } catch {}
        try { customCourses = JSON.parse(localStorage.getItem("golflog_custom_courses")) || []; } catch {}
        const backup = {
          version: 2,
          exported: new Date().toISOString(),
          rounds: rounds,
          favorites: favorites,
          customCourses: customCourses
        };
        const data = JSON.stringify(backup, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `golflog-backup-${new Date().toISOString().split("T")[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        try { localStorage.setItem("golflog_last_backup", Date.now().toString()); } catch {}
        return true;
      } catch { return false; }
    }

    function exportRoundsCSV(rounds) {
      try {
        const rows = [];
        // Header row
        const header = ["Date", "Course", "Total Score", "Total Par", "+/-", "Total Putts", "Total Chips", "Fairways Hit", "GIR"];
        for (let h = 1; h <= 18; h++) header.push("H" + h + " Par", "H" + h + " Score", "H" + h + " Putts", "H" + h + " Chips");
        rows.push(header);

        rounds.forEach(r => {
          const holes = r.holes || [];
          let totalScore = 0, totalPar = 0, totalPutts = 0, totalChips = 0, fairways = 0, gir = 0, fairwayCount = 0;
          holes.forEach(h => {
            if (h.score) totalScore += Number(h.score);
            if (h.par) totalPar += Number(h.par);
            if (h.putts) totalPutts += Number(h.putts);
            if (h.chips) totalChips += Number(h.chips);
            if (h.par !== 3) { fairwayCount++; if (h.fairway === "hit") fairways++; }
            if (h.gir === true) gir++;
          });
          const row = [
            r.date || "",
            '"' + (r.course || "Unnamed").replace(/"/g, '""') + '"',
            totalScore || "",
            totalPar || "",
            totalScore && totalPar ? (totalScore - totalPar > 0 ? "+" + (totalScore - totalPar) : totalScore - totalPar) : "",
            totalPutts || "",
            totalChips || "",
            fairwayCount ? fairways + "/" + fairwayCount : "",
            gir + "/18"
          ];
          for (let i = 0; i < 18; i++) {
            const h = holes[i] || {};
            row.push(h.par || "", h.score || "", h.putts || "", h.chips || "");
          }
          rows.push(row);
        });

        const csv = rows.map(r => r.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `golflog-rounds-${new Date().toISOString().split("T")[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return true;
      } catch { return false; }
    }

    function exportCHGSCSV(rounds) {
      try {
        const rows = [];
        const header = ["Date", "Course", "Hole", "Par", "Score", "Putts", "Chips", "Fairway", "Green +80", "Green -80", "Up & Down"];
        rows.push(header);

        const fmt = v => v === true ? "Hit" : v === false ? "Miss" : (v === "na" ? "N/A" : (v || ""));
        const fmtUD = v => v === true ? "Yes" : v === false ? "No" : "";

        rounds.forEach(r => {
          const holes = r.holes || [];
          holes.forEach((h, i) => {
            // Only include holes that have CHGS data entered
            const hasData = h.chgsScore || h.chgsPutts || h.chips || h.chgsFairway || h.greenPlus80 != null || h.greenMinus80 != null || h.upAndDown != null;
            if (!hasData) return;
            rows.push([
              r.date || "",
              '"' + (r.course || "Unnamed").replace(/"/g, '""') + '"',
              i + 1,
              h.par || "",
              h.chgsScore || h.score || "",
              h.chgsPutts || h.putts || "",
              h.chips || "",
              h.chgsFairway === "hit" ? "Hit" : (h.chgsFairway === "left" ? "Left" : (h.chgsFairway === "right" ? "Right" : "")),
              fmt(h.greenPlus80),
              fmt(h.greenMinus80),
              fmtUD(h.upAndDown)
            ]);
          });
        });

        const csv = rows.map(r => r.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `golflog-chgs-${new Date().toISOString().split("T")[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return true;
      } catch { return false; }
    }

    function importRounds(file, onSuccess, onError) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            // Old format: just rounds
            onSuccess(data);
          } else if (data && Array.isArray(data.rounds)) {
            // New format: full backup - restore favorites and custom courses too
            try { if (data.favorites) localStorage.setItem("golflog_favorites", JSON.stringify(data.favorites)); } catch {}
            try { if (data.customCourses) localStorage.setItem("golflog_custom_courses", JSON.stringify(data.customCourses)); } catch {}
            onSuccess(data.rounds);
          } else {
            onError("Invalid file format");
          }
        } catch { onError("Could not read file"); }
      };
      reader.readAsText(file);
    }

    // ── Text summary builder ─────────────────────────────────────────
    function buildTextSummary(round) {
      const played = round.holes.filter(h => h.score !== "");
      if (!played.length) return "No scores entered yet.";
      const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const diff       = totalScore - totalPar;
      const diffStr    = diff === 0 ? "E" : diff > 0 ? `+${diff}` : `${diff}`;
      const puttHoles  = played.filter(h => h.putts !== "");
      const totalPutts = puttHoles.reduce((s, h) => s + Number(h.putts), 0);
      const fwHoles    = played.filter(h => h.fairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.fairway === "hit").length;
      const girCount   = played.filter(h => h.gir === true).length;

      // CHGS
      const cp = round.holes.filter(h => h.chgsScore !== "");
      const g80p = cp.filter(h => h.greenPlus80 === true || h.greenPlus80 === false);
      const g80m = cp.filter(h => h.greenMinus80 === true || h.greenMinus80 === false);
      const ud   = cp.filter(h => h.upAndDown === true || h.upAndDown === false);
      const chgsFw = cp.filter(h => h.chgsFairway !== null && h.par !== 3);

      let text = `⛳ GOLF ROUND SUMMARY\n`;
      text += `━━━━━━━━━━━━━━━━━━━━\n`;
      text += `Course: ${round.course || "Untitled"}\n`;
      text += `Date:   ${round.date}\n\n`;
      text += `SCORECARD\n`;
      text += `Score:  ${totalScore} (${diffStr})\n`;
      if (puttHoles.length) text += `Putts:  ${totalPutts} (${(totalPutts/puttHoles.length).toFixed(1)}/hole)\n`;
      if (fwHoles.length)   text += `FIR:    ${fwHit}/${fwHoles.length} (${Math.round(fwHit/fwHoles.length*100)}%)\n`;
      text += `GIR:    ${girCount}/${played.length} (${Math.round(girCount/played.length*100)}%)\n`;

      if (cp.length) {
        text += `\nCHGS STATS\n`;
        if (chgsFw.length) text += `Fairway:     ${chgsFw.filter(h=>h.chgsFairway==="hit").length}/${chgsFw.length} (${Math.round(chgsFw.filter(h=>h.chgsFairway==="hit").length/chgsFw.length*100)}%)\n`;
        if (g80p.length)   text += `Green +80:   ${g80p.filter(h=>h.greenPlus80===true).length}/${g80p.length} (${Math.round(g80p.filter(h=>h.greenPlus80===true).length/g80p.length*100)}%)\n`;
        if (g80m.length)   text += `Green -80:   ${g80m.filter(h=>h.greenMinus80===true).length}/${g80m.length} (${Math.round(g80m.filter(h=>h.greenMinus80===true).length/g80m.length*100)}%)\n`;
        if (ud.length)     text += `Up & Down:   ${ud.filter(h=>h.upAndDown===true).length}/${ud.length} (${Math.round(ud.filter(h=>h.upAndDown===true).length/ud.length*100)}%)\n`;
      }

      text += `\nHOLE BY HOLE\n`;
      text += `H  Par Score\n`;
      round.holes.forEach((h, i) => {
        if (h.score === "") return;
        const d = Number(h.score) - Number(h.par);
        const badge = d <= -2 ? "Eagle" : d === -1 ? "Birdie" : d === 0 ? "Par" : d === 1 ? "Bogey" : d === 2 ? "Double" : `+${d}`;
        text += `${String(i+1).padStart(2)}   ${h.par}     ${h.score}   ${badge}\n`;
      });
      return text;
    }

    // ── Shared components ────────────────────────────────────────────
    const FairwayBtn = ({ value, active, onClick, color }) => (
      <button onClick={onClick} style={{
        padding: "4px 9px", borderRadius: 6, border: "none",
        background: active ? color : "var(--surface2)", color: active ? "#fff" : "var(--text3)",
        fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
      }}>{value}</button>
    );

    const ToggleBtn = ({ label, active, onClick, activeColor }) => (
      <button onClick={onClick} style={{
        padding: "4px 10px", borderRadius: 6, border: "none",
        background: active ? activeColor : "var(--surface2)", color: active ? "#fff" : "var(--text3)",
        fontSize: 13, fontWeight: 700, cursor: "pointer", transition: "all 0.15s",
      }}>{label}</button>
    );

    const ScoreBadge = ({ score, par }) => {
      if (score === "" || score == null) return null;
      const diff = Number(score) - Number(par);
      const bg = diff <= -2 ? "#f59e0b" : diff === -1 ? "#22c55e" : diff === 0 ? "#3b82f6" : diff === 1 ? "#f87171" : "#dc2626";
      const label = diff <= -2 ? "Eagle" : diff === -1 ? "Birdie" : diff === 0 ? "Par" : diff === 1 ? "Bogey" : diff === 2 ? "Double" : `+${diff}`;
      return <span style={{ background: bg, color: "#fff", borderRadius: 5, padding: "1px 7px", fontSize: 13, fontWeight: 700, marginLeft: 6 }}>{label}</span>;
    };

    // ── Share Modal ──────────────────────────────────────────────────
    function ShareModal({ round, allRounds, onClose, onImport }) {
      const [toast, setToast] = useState("");

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

      const handleCopyText = () => {
        const text = buildTextSummary(round);
        navigator.clipboard.writeText(text).then(() => { showToast("✓ Copied to clipboard!"); setTimeout(onClose, 1200); }).catch(() => {
          const el = document.createElement("textarea");
          el.value = text; document.body.appendChild(el); el.select();
          document.execCommand("copy"); document.body.removeChild(el);
          showToast("✓ Copied to clipboard!");
        });
      };

      const handleShareText = () => {
        const text = buildTextSummary(round);
        if (navigator.share) {
          navigator.share({ title: "Golf Round", text }).catch(() => {});
        } else { handleCopyText(); }
      };

      const handleShareLink = () => {
        const encoded = encodeRound(round);
        const url = `${window.location.origin}${window.location.pathname}?round=${encoded}`;
        if (navigator.share) {
          navigator.share({ title: "Golf Round", url }).catch(() => {});
        } else {
          navigator.clipboard.writeText(url).then(() => showToast("✓ Link copied!")).catch(() => showToast("✓ Link copied!"));
        }
      };

      const handlePDF = () => {
        window.print();
      };

      const btnStyle = (color) => ({
        width: "100%", padding: "13px 16px", borderRadius: 12, border: "none",
        background: color, color: "#fff", fontWeight: 700, fontSize: 16,
        cursor: "pointer", marginBottom: 10, textAlign: "left",
        display: "flex", alignItems: "center", gap: 12,
      });

      return (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)",
          zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center",
        }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "var(--surface)", borderRadius: "20px 20px 0 0",
            padding: "24px 16px 36px", width: "100%", maxWidth: 430,
          }}>
            <div style={{ width: 40, height: 4, background: "var(--border)", borderRadius: 2, margin: "0 auto 20px" }} />
            <div style={{ color: "var(--text)", fontWeight: 800, fontSize: 17, marginBottom: 6 }}>Share Round</div>
            <div style={{ color: "var(--text3)", fontSize: 15, marginBottom: 20 }}>
              {round.course || "Untitled Round"} · {round.date}
            </div>

            <button onClick={handleShareText} style={btnStyle("#166534")}>
              <span style={{ fontSize: 20 }}>📋</span>
              <div>
                <div>Copy / Share as Text</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Full summary you can paste into any message</div>
              </div>
            </button>

            <button onClick={handleShareLink} style={btnStyle("var(--surface-blue)")}>
              <span style={{ fontSize: 20 }}>🔗</span>
              <div>
                <div>Share Link</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Anyone with the link sees your full round</div>
              </div>
            </button>

            <button onClick={handlePDF} style={btnStyle("#4a1d96")}>
              <span style={{ fontSize: 20 }}>📄</span>
              <div>
                <div>Save as PDF</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Use your phone's print → Save as PDF</div>
              </div>
            </button>

            <button onClick={() => { if(exportAllRounds(allRounds)) { showToast("✓ Full backup saved!"); setTimeout(onClose, 1200); } else showToast("Could not save file"); }} style={btnStyle("#78350f")}>
              <span style={{ fontSize: 20 }}>💾</span>
              <div>
                <div>Backup Everything</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Rounds, favorites &amp; my courses — save to your phone</div>
              </div>
            </button>

            <button onClick={() => { if(exportRoundsCSV(allRounds)) { showToast("✓ Scores CSV saved!"); setTimeout(onClose, 1200); } else showToast("Could not save file"); }} style={btnStyle("#166534")}>
              <span style={{ fontSize: 20 }}>📊</span>
              <div>
                <div>Export Scores (Excel/CSV)</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Scores, putts &amp; stats — opens in Excel</div>
              </div>
            </button>

            <button onClick={() => { if(exportCHGSCSV(allRounds)) { showToast("✓ CHGS CSV saved!"); setTimeout(onClose, 1200); } else showToast("Could not save file"); }} style={btnStyle("#1e40af")}>
              <span style={{ fontSize: 20 }}>📊</span>
              <div>
                <div>Export CHGS Stats (Excel/CSV)</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>CHGS hole-by-hole — opens in Excel</div>
              </div>
            </button>

            <label style={{ ...btnStyle("#1a2e1a"), display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}>
              <span style={{ fontSize: 20 }}>📂</span>
              <div>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 16 }}>Import Rounds</div>
                <div style={{ fontSize: 13, fontWeight: 400, opacity: 0.8, marginTop: 2, color: "#fff" }}>Restore rounds from a backup file</div>
              </div>
              <input type="file" accept=".json" style={{ display: "none" }} onChange={e => {
                const file = e.target.files[0];
                if (!file) return;
                importRounds(file,
                  (data) => { onImport(data); showToast("✓ Rounds imported!"); },
                  (err) => showToast("❌ " + err)
                );
                e.target.value = "";
              }} />
            </label>

            <button onClick={onClose} style={{
              width: "100%", padding: "13px", borderRadius: 12, border: "none",
              background: "var(--surface2)", color: "var(--text3)", fontWeight: 700, fontSize: 16, cursor: "pointer",
            }}>Cancel</button>

            {toast && (
              <div style={{
                position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)",
                background: "#22c55e", color: "#fff", padding: "10px 20px",
                borderRadius: 20, fontWeight: 700, fontSize: 16, zIndex: 200,
              }}>{toast}</div>
            )}
          </div>
        </div>
      );
    }

    // ── Print View ───────────────────────────────────────────────────
    function PrintView({ round }) {
      const played = round.holes.filter(h => h.score !== "");
      const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const diff       = totalScore - totalPar;
      const diffStr    = diff === 0 ? "E" : diff > 0 ? `+${diff}` : `${diff}`;
      const puttHoles  = played.filter(h => h.putts !== "");
      const totalPutts = puttHoles.reduce((s, h) => s + Number(h.putts), 0);
      const fwHoles    = played.filter(h => h.fairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.fairway === "hit").length;
      const girCount   = played.filter(h => h.gir === true).length;

      return (
        <div style={{ display: "none" }} className="print-only">
          <style>{`@media print { .print-only { display: block !important; } .no-print { display: none !important; } body { background: white; color: black; font-family: sans-serif; } }`}</style>
          <h1 style={{ fontSize: 22, marginBottom: 4 }}>⛳ GolfLog</h1>
          <h2 style={{ fontSize: 16, fontWeight: 400, marginBottom: 16, color: "#555" }}>{round.course || "Untitled Round"} · {round.date}</h2>
          <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 20 }}>
            <thead>
              <tr style={{ background: "#f0f0f0" }}>
                {["Hole","Par","Score","+/-","Putts","FIR","GIR"].map(h => (
                  <th key={h} style={{ padding: "6px 8px", border: "1px solid #ddd", fontSize: 14 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {round.holes.map((h, i) => {
                const d = h.score !== "" ? Number(h.score) - Number(h.par) : null;
                return (
                  <tr key={i}>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{i+1}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{h.par}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14, fontWeight: 700 }}>{h.score || "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{d !== null ? (d === 0 ? "E" : d > 0 ? `+${d}` : d) : "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{h.putts || "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{h.par === 3 ? "N/A" : h.fairway === "hit" ? "✓" : h.fairway ? "✗" : "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{h.gir === true ? "✓" : h.gir === false ? "✗" : "—"}</td>
                  </tr>
                );
              })}
              <tr style={{ background: "#f0f0f0", fontWeight: 700 }}>
                <td colSpan={2} style={{ padding: "6px 8px", border: "1px solid #ddd", fontSize: 14 }}>TOTAL</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{totalScore}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{diffStr}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{puttHoles.length ? totalPutts : "—"}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{fwHoles.length ? `${fwHit}/${fwHoles.length}` : "—"}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 14 }}>{played.length ? `${girCount}/${played.length}` : "—"}</td>
              </tr>
            </tbody>
          </table>
          <p style={{ fontSize: 13, color: "#888" }}>Generated by GolfLog</p>
        </div>
      );
    }

    // ── HoleCard ─────────────────────────────────────────────────────
    function HoleCard({ hole, holeNum, onChange }) {
      const [showScorePad, setShowScorePad] = React.useState(false);
      const openScorePad = () => setShowScorePad(true);
      const closeScorePad = () => setShowScorePad(false);
      const isParThree = hole.par === 3;
      return (
        <React.Fragment>
        <div style={{ background: "var(--surface)", borderRadius: 14, padding: "14px 16px", border: "1px solid var(--surface2)", marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={openScorePad} style={{ width: 40, height: 40, borderRadius: 10, background: "#16a34a", color: "#ffffff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 16, border: "none", cursor: "pointer", boxShadow: "0 2px 8px rgba(34,197,94,0.4)" }}>{holeNum}</button>
              <div>
                <div style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em" }}>HOLE</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ color: "var(--text)", fontSize: 14, fontWeight: 600 }}>Par</span>
                  <div style={{ display: "flex", gap: 3 }}>
                    {PAR_OPTIONS.map(p => (
                      <button key={p} onClick={() => onChange({ ...hole, par: p, fairway: p === 3 ? null : hole.fairway })}
                        style={{ width: 24, height: 22, borderRadius: 5, border: "none", background: hole.par === p ? "#166534" : "var(--surface2)", color: hole.par === p ? "#4ade80" : "var(--text3)", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>{p}</button>
                    ))}
                  </div>
                  {hole.yardage && <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600 }}>· {hole.yardage} yds</span>}
                </div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <button onClick={openScorePad}
                style={{ width: 52, height: 40, borderRadius: 10, background: "var(--surface2)", border: "1px solid var(--border)", color: hole.score ? "var(--text)" : "var(--text4)", fontSize: 22, fontWeight: 800, textAlign: "center", outline: "none", cursor: "pointer" }}>
                {hole.score || "—"}
              </button>
              <ScoreBadge score={hole.score} par={hole.par} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em" }}>PUTTS</span>
              <input type="number" min="0" max="10" value={hole.putts} onChange={e => onChange({ ...hole, putts: e.target.value })} placeholder="—"
                style={{ width: 38, height: 28, borderRadius: 7, background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--text)", fontSize: 16, fontWeight: 700, textAlign: "center", outline: "none" }} />
            </div>
            {!isParThree && (
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em" }}>FIR</span>
                <FairwayBtn value="◀" active={hole.fairway === "left"} color="#f59e0b" onClick={() => onChange({ ...hole, fairway: hole.fairway === "left" ? null : "left", chgsFairway: hole.fairway === "left" ? null : "left" })} />
                <FairwayBtn value="✓ Hit" active={hole.fairway === "hit"} color="#22c55e" onClick={() => onChange({ ...hole, fairway: hole.fairway === "hit" ? null : "hit", chgsFairway: hole.fairway === "hit" ? null : "hit" })} />
                <FairwayBtn value="▶" active={hole.fairway === "right"} color="#f59e0b" onClick={() => onChange({ ...hole, fairway: hole.fairway === "right" ? null : "right", chgsFairway: hole.fairway === "right" ? null : "right" })} />
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em" }}>GIR</span>
              <button onClick={() => onChange({ ...hole, gir: hole.gir === true ? null : true, greenPlus80: hole.gir === true ? null : true })}
                style={{ padding: "3px 9px", borderRadius: 6, border: "none", background: hole.gir === true ? "#166534" : "var(--surface2)", color: hole.gir === true ? "#4ade80" : "var(--text3)", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Yes</button>
              <button onClick={() => onChange({ ...hole, gir: hole.gir === false ? null : false, greenPlus80: hole.gir === false ? null : false })}
                style={{ padding: "3px 9px", borderRadius: 6, border: "none", background: hole.gir === false ? "#7f1d1d" : "var(--surface2)", color: hole.gir === false ? "#f87171" : "var(--text3)", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>No</button>
            </div>
          </div>
        </div>
        {showScorePad && (
          <div onClick={() => closeScorePad()} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000 }}>
            <div onClick={e => e.stopPropagation()} style={{ background: "var(--surface)", borderTopLeftRadius: 24, borderTopRightRadius: 24, padding: "20px 16px 32px", width: "100%", maxWidth: 430, border: "1px solid var(--surface2)", maxHeight: "88vh", overflowY: "auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                <div>
                  <div style={{ color: "#4ade80", fontSize: 16, fontWeight: 800 }}>HOLE {holeNum} · PAR {hole.par}{hole.yardage ? ` · ${hole.yardage} yds` : ""}</div>
                  <div style={{ color: "var(--text3)", fontSize: 14 }}>Enter your stats</div>
                </div>
                <button onClick={() => closeScorePad()} style={{ background: "var(--surface2)", border: "none", color: "var(--text2)", width: 36, height: 36, borderRadius: 18, fontSize: 18, cursor: "pointer" }}>✕</button>
              </div>

              {/* SCORE */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>SCORE</div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                <input type="number" inputMode="numeric" pattern="[0-9]*" min="1" max="15" value={hole.score || ""} autoFocus
                  onChange={e => onChange({ ...hole, score: e.target.value, chgsScore: e.target.value })} placeholder="—"
                  style={{ flex: 1, height: 64, borderRadius: 14, background: "var(--surface2)", border: "2px solid #16a34a", color: "var(--text)", fontSize: 32, fontWeight: 800, textAlign: "center", outline: "none" }} />
                {hole.score && (() => {
                  const diff = Number(hole.score) - hole.par;
                  let label = "";
                  if (diff <= -2) label = "Eagle";
                  else if (diff === -1) label = "Birdie";
                  else if (diff === 0) label = "Par";
                  else if (diff === 1) label = "Bogey";
                  else if (diff === 2) label = "Double";
                  else if (diff === 3) label = "Triple";
                  else if (diff > 3) label = "+" + diff;
                  return label ? <span style={{ color: "#4ade80", fontSize: 18, fontWeight: 700, minWidth: 70 }}>{label}</span> : null;
                })()}
              </div>

              {/* PUTTS */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>PUTTS</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, marginBottom: 20 }}>
                {[0,1,2,3,4,5].map(n => {
                  const selected = String(hole.putts) === String(n);
                  return (
                    <button key={n} onClick={() => onChange({ ...hole, putts: String(n), chgsPutts: String(n) })}
                      style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #4ade80" : "1px solid var(--border)", background: selected ? "#16a34a" : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
                      {n}
                    </button>
                  );
                })}
              </div>

              {/* CHIPS */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>CHIPS</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, marginBottom: 20 }}>
                {[0,1,2,3,4,5].map(n => {
                  const selectedChip = String(hole.chips) === String(n);
                  return (
                    <button key={n} onClick={() => onChange({ ...hole, chips: String(n) })}
                      style={{ height: 48, borderRadius: 10, border: selectedChip ? "2px solid #4ade80" : "1px solid var(--border)", background: selectedChip ? "#16a34a" : "var(--surface2)", color: selectedChip ? "#ffffff" : "var(--text)", fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
                      {n}
                    </button>
                  );
                })}
              </div>

              {/* FAIRWAY - only for par 4/5 */}
              {hole.par !== 3 && (
                <React.Fragment>
                  <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>FAIRWAY</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 20 }}>
                    {[["left","◀ Left","var(--surface2)"],["hit","Hit","#16a34a"],["right","Right ▶","var(--surface2)"]].map(([val,lbl,selBg]) => {
                      const selected = hole.fairway === val;
                      return (
                        <button key={val} onClick={() => onChange({ ...hole, fairway: selected ? null : val, chgsFairway: selected ? null : val })}
                          style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #4ade80" : "1px solid var(--border)", background: selected ? (val==="hit"?"#16a34a":"#b45309") : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
                          {lbl}
                        </button>
                      );
                    })}
                  </div>
                </React.Fragment>
              )}

              {/* GIR */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>GREEN IN REGULATION</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8, marginBottom: 20 }}>
                {[[true,"✓ Yes","#16a34a"],[false,"✕ No","#b91c1c"]].map(([val,lbl,selBg]) => {
                  const selected = hole.gir === val;
                  return (
                    <button key={String(val)} onClick={() => onChange({ ...hole, gir: selected ? null : val, greenPlus80: selected ? null : val })}
                      style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #4ade80" : "1px solid var(--border)", background: selected ? selBg : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                      {lbl}
                    </button>
                  );
                })}
              </div>

              <button onClick={() => closeScorePad()}
                style={{ width: "100%", height: 52, borderRadius: 14, border: "none", background: "#16a34a", color: "#ffffff", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                Done
              </button>
            </div>
          </div>
        )}
        </React.Fragment>
      );
    }

    // ── CHGSHoleCard ─────────────────────────────────────────────────
    function CHGSHoleCard({ hole, holeNum, onChange }) {

                style={{ width: 46, height: 36, borderRadius: 9, background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--text)", fontSize: 20, fontWeight: 800, textAlign: "center", outline: "none" }} />

                <FairwayBtn value="✓ Hit" active={hole.chgsFairway === "hit"} color="#22c55e" onClick={() => onChange({ ...hole, chgsFairway: hole.chgsFairway === "hit" ? null : "hit", fairway: hole.chgsFairway === "hit" ? null : "hit" })} />
                <FairwayBtn value="Right ▶" active={hole.chgsFairway === "right"} color="#f59e0b" onClick={() => onChange({ ...hole, chgsFairway: hole.chgsFairway === "right" ? null : "right", fairway: hole.chgsFairway === "right" ? null : "right" })} />
              </div>
            </div>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 9 }}>
            <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em", minWidth: 68 }}>GREEN +80</span>
            <div style={{ display: "flex", gap: 4 }}>
              <ToggleBtn label="Hit ✓" active={hole.greenPlus80 === true} activeColor="#22c55e" onClick={() => { const hitting = hole.greenPlus80 !== true; onChange({ ...hole, greenPlus80: hitting ? true : null, gir: hitting ? true : null }); }} />
              <ToggleBtn label="Missed ✗" active={hole.greenPlus80 === false} activeColor="#ef4444" onClick={() => { const missing = hole.greenPlus80 !== false; onChange({ ...hole, greenPlus80: missing ? false : null, gir: missing ? false : null }); }} />
              <ToggleBtn label="N/A" active={hole.greenPlus80 === "na"} activeColor="var(--text4)" onClick={() => onChange({ ...hole, greenPlus80: hole.greenPlus80 === "na" ? null : "na", gir: null })} />
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 9 }}>
            <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em", minWidth: 68 }}>GREEN -80</span>
            <div style={{ display: "flex", gap: 4 }}>
              <ToggleBtn label="Hit ✓" active={hole.greenMinus80 === true} activeColor="#22c55e" onClick={() => { const hitting = hole.greenMinus80 !== true; onChange({ ...hole, greenMinus80: hitting ? true : null, gir: hitting ? true : null }); }} />
              <ToggleBtn label="Missed ✗" active={hole.greenMinus80 === false} activeColor="#ef4444" onClick={() => { const missing = hole.greenMinus80 !== false; onChange({ ...hole, greenMinus80: missing ? false : null, gir: missing ? false : null }); }} />
              <ToggleBtn label="N/A" active={hole.greenMinus80 === "na"} activeColor="var(--text4)" onClick={() => onChange({ ...hole, greenMinus80: hole.greenMinus80 === "na" ? null : "na", gir: null })} />

          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em" }}>UP & DOWN</span>
              <div style={{ display: "flex", gap: 4 }}>
                <ToggleBtn label="Yes" active={hole.upAndDown === true} activeColor="#22c55e" onClick={() => onChange({ ...hole, upAndDown: hole.upAndDown === true ? null : true })} />
                <ToggleBtn label="No" active={hole.upAndDown === false} activeColor="#ef4444" onClick={() => onChange({ ...hole, upAndDown: hole.upAndDown === false ? null : false })} />
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em" }}>PUTTS</span>
              <input type="number" min="0" max="10" value={hole.chgsPutts}
                onChange={e => onChange({ ...hole, chgsPutts: e.target.value, putts: e.target.value })} placeholder="—"
                style={{ width: 38, height: 28, borderRadius: 7, background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--text)", fontSize: 16, fontWeight: 700, textAlign: "center", outline: "none" }} />
            </div>
          </div>

            <div onClick={e => e.stopPropagation()} style={{ background: "var(--surface)", borderTopLeftRadius: 24, borderTopRightRadius: 24, padding: "20px 16px 32px", width: "100%", maxWidth: 430, border: "1px solid var(--surface-blue)", maxHeight: "88vh", overflowY: "auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                <div>
                  <div style={{ color: "#60a5fa", fontSize: 16, fontWeight: 800 }}>HOLE {holeNum} · PAR {hole.par}{hole.yardage ? ` · ${hole.yardage} yds` : ""}</div>
                  <div style={{ color: "var(--text3)", fontSize: 14 }}>Enter your CHGS stats</div>
                </div>
                <button onClick={() => closePad()} style={{ background: "var(--surface2)", border: "none", color: "var(--text2)", width: 36, height: 36, borderRadius: 18, fontSize: 18, cursor: "pointer" }}>✕</button>
              </div>

              {/* SCORE */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>SCORE</div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                <input type="number" inputMode="numeric" pattern="[0-9]*" min="1" max="15" value={hole.chgsScore || ""} autoFocus
                  onChange={e => onChange({ ...hole, chgsScore: e.target.value, score: e.target.value })} placeholder="—"
                  style={{ flex: 1, height: 64, borderRadius: 14, background: "var(--surface2)", border: "2px solid #2563eb", color: "var(--text)", fontSize: 32, fontWeight: 800, textAlign: "center", outline: "none" }} />
                {hole.chgsScore && (() => {
                  const diff = Number(hole.chgsScore) - hole.par;
                  let label = "";
                  if (diff <= -2) label = "Eagle";
                  else if (diff === -1) label = "Birdie";
                  else if (diff === 0) label = "Par";
                  else if (diff === 1) label = "Bogey";
                  else if (diff === 2) label = "Double";
                  else if (diff === 3) label = "Triple";
                  else if (diff > 3) label = "+" + diff;
                  return label ? <span style={{ color: "#60a5fa", fontSize: 18, fontWeight: 700, minWidth: 70 }}>{label}</span> : null;
                })()}
              </div>

              {/* FAIRWAY */}
              {!isParThree && (
                <React.Fragment>
                  <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>FAIRWAY</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 20 }}>
                    {[["left","◀ Left"],["hit","✓ Hit"],["right","Right ▶"]].map(([val,lbl]) => {
                      const selected = hole.chgsFairway === val;
                      return (
                        <button key={val} onClick={() => onChange({ ...hole, chgsFairway: selected ? null : val, fairway: selected ? null : val })}
                          style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #60a5fa" : "1px solid var(--border)", background: selected ? (val==="hit"?"#16a34a":"#b45309") : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
                          {lbl}
                        </button>
                      );
                    })}
                  </div>
                </React.Fragment>
              )}

              {/* GREEN +80 */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>GREEN +80 (over 80 yds)</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 20 }}>
                {[[true,"✓ Hit","#16a34a"],[false,"✕ Miss","#b91c1c"],["na","N/A","var(--text3)"]].map(([val,lbl,bg]) => {
                  const selected = hole.greenPlus80 === val;
                  return (
                    <button key={String(val)} onClick={() => onChange({ ...hole, greenPlus80: selected ? null : val, gir: val === true ? true : (val === false ? false : null) })}
                      style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #60a5fa" : "1px solid var(--border)", background: selected ? bg : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
                      {lbl}
                    </button>
                  );
                })}
              </div>

              {/* GREEN -80 */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>GREEN -80 (under 80 yds)</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 20 }}>
                {[[true,"✓ Hit","#16a34a"],[false,"✕ Miss","#b91c1c"],["na","N/A","var(--text3)"]].map(([val,lbl,bg]) => {
                  const selected = hole.greenMinus80 === val;
                  return (
                    <button key={String(val)} onClick={() => onChange({ ...hole, greenMinus80: selected ? null : val, gir: val === true ? true : (val === false ? false : null) })}
                      style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #60a5fa" : "1px solid var(--border)", background: selected ? bg : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
                      {lbl}
                    </button>
                  );
                })}
              </div>

              {/* UP AND DOWN */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>UP &amp; DOWN</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8, marginBottom: 20 }}>
                {[[true,"✓ Yes","#16a34a"],[false,"✕ No","#b91c1c"]].map(([val,lbl,bg]) => {
                  const selected = hole.upAndDown === val;
                  return (
                    <button key={String(val)} onClick={() => onChange({ ...hole, upAndDown: selected ? null : val })}
                      style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #60a5fa" : "1px solid var(--border)", background: selected ? bg : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                      {lbl}
                    </button>
                  );
                })}
              </div>

              {/* PUTTS */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>PUTTS</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, marginBottom: 24 }}>
                {[0,1,2,3,4,5].map(n => {
                  const selected = String(hole.chgsPutts) === String(n);
                  return (
                    <button key={n} onClick={() => onChange({ ...hole, chgsPutts: String(n), putts: String(n) })}
                      style={{ height: 48, borderRadius: 10, border: selected ? "2px solid #60a5fa" : "1px solid var(--border)", background: selected ? "#2563eb" : "var(--surface2)", color: selected ? "#ffffff" : "var(--text)", fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
                      {n}
                    </button>
                  );
                })}
              </div>

              {/* CHIPS */}
              <div style={{ color: "var(--text3)", fontSize: 14, fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>CHIPS</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, marginBottom: 24 }}>
                {[0,1,2,3,4,5].map(n => {
                  const selectedChip = String(hole.chips) === String(n);
                  return (
                    <button key={n} onClick={() => onChange({ ...hole, chips: String(n) })}
                      style={{ height: 48, borderRadius: 10, border: selectedChip ? "2px solid #60a5fa" : "1px solid var(--border)", background: selectedChip ? "#2563eb" : "var(--surface2)", color: selectedChip ? "#ffffff" : "var(--text)", fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
                      {n}
                    </button>
                  );
                })}
              </div>

              <button onClick={() => closePad()}
                style={{ width: "100%", height: 52, borderRadius: 14, border: "none", background: "#2563eb", color: "#ffffff", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                Done
              </button>
            </div>
          </div>
        )}
        </React.Fragment>
      );
    }


    // ── Courses Tab ──────────────────────────────────────────────────
    function CoursesTab({ onSelectCourse }) {
      const [tab, setTab] = useState("search"); // search | custom | favorites
      const [state, setState] = useState("");
      const [country, setCountry] = useState("");
      const [query, setQuery] = useState("");
      const [countries, setCountries] = useState([]);
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [favLoadingId, setFavLoadingId] = useState(null); // tracks which single favorite is loading, not shared across rows
      const [error, setError] = useState("");
      const [selectedTee, setSelectedTee] = useState(null);
      const [selectedCourse, setSelectedCourse] = useState(null);
      const [favorites, setFavorites] = useState(() => {
        try { return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || []; } catch { return []; }
      });
      const [customCourses, setCustomCourses] = useState(() => {
        try { return JSON.parse(localStorage.getItem(COURSES_KEY)) || []; } catch { return []; }
      });

      // Custom course builder state
      const [newCourseName, setNewCourseName] = useState("");
      const [newCourseState, setNewCourseState] = useState("");
      const [newCoursePars, setNewCoursePars] = useState(Array(18).fill(4));

      const [courseIndex, setCourseIndex] = useState(null);
      const [indexError, setIndexError] = useState("");

      // Load the static course index once on mount
      React.useEffect(() => {
        loadCourseIndex()
          .then(data => {
            setCourseIndex(data);
            const unique = [...new Set(data.map(c => c.co).filter(c => c && c !== "Unknown"))].sort();
            setCountries(["", ...unique]);
          })
          .catch(() => setIndexError("Could not load course list. Check your connection and reload."));
      }, []);

      const saveFavorites = (favs) => {
        setFavorites(favs);
        try { localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs)); } catch {}
      };
      const saveCustomCourses = (courses) => {
        setCustomCourses(courses);
        try { localStorage.setItem(COURSES_KEY, JSON.stringify(courses)); } catch {}
      };

      const isFav = (id) => favorites.some(f => f.id === id);

      const toggleFav = (course) => {
        if (isFav(course.id)) {
          saveFavorites(favorites.filter(f => f.id !== course.id));
        } else {
          saveFavorites([...favorites, course]);
        }
      };

      const stateAbbrevs = {
        "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
        "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
        "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS",
        "Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA",
        "Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT",
        "Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM",
        "New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK",
        "Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
        "South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT",
        "Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"
      };

      const searchCourses = () => {
        if (!state && !query.trim() && !country) { setError("Please select a country or state, or enter part of a course name."); return; }
        if (!courseIndex) {
          setError(indexError || "Course list still loading — try again in a moment.");
          return;
        }
        setLoading(true); setError(""); setResults([]);

        const stateAbbr = state ? stateAbbrevs[state] : null;
        const q = query.trim().toLowerCase();

        let matches = courseIndex;
        if (country) matches = matches.filter(c => c.co === country);
        if (stateAbbr) matches = matches.filter(c => c.s === stateAbbr);
        if (q) matches = matches.filter(c => (c.n || "").toLowerCase().includes(q) || (c.cn || "").toLowerCase().includes(q));

        // Dedupe by name+city, prefer the entry with more holes listed
        const byKey = {};
        for (const c of matches) {
          const key = (c.n + "|" + (c.cn || "") + "|" + c.c).toLowerCase();
          if (!byKey[key] || (c.h || 0) > (byKey[key].h || 0)) byKey[key] = c;
        }
        const deduped = Object.values(byKey)
          .sort((a, b) => (a.n || "").localeCompare(b.n || ""))
          .slice(0, 500)
          .map(c => ({
            id: c.id, club_name: c.n, course_name: c.cn || c.n,
            number_of_holes: c.h,
            location: {
              city: c.c && c.c !== "Unknown" ? c.c : "",
              state: c.s && c.s !== "Unknown" ? c.s : "",
              country: c.co && c.co !== "Unknown" ? c.co : ""
            },
            tees: null // loaded lazily on selection
          }));

        setResults(deduped);
        if (!deduped.length) {
          setError(`No courses found${country ? " in " + country : ""}${state ? ", " + state : ""}${q ? ` for "${query.trim()}"` : ""}. Try a different name, or add it manually via My Courses.`);
        }
        setLoading(false);
      };

      // Fetch tee data for a course from its bucket and open the detail view
      const selectCourse = async (c) => {
        setLoading(true); setError("");
        try {
          const tees = await getCourseTees(c.id);
          setSelectedCourse({ ...c, tees });
        } catch {
          setSelectedCourse({ ...c, tees: {} });
          setError("Could not load tee data for this course.");
        }
        setSelectedTee(null);
        setLoading(false);
      };


      const applyCoursePars = (course) => {
        let pars = Array(18).fill(4);
        let yardages = Array(18).fill(null);
        let holes = [];
        let teeName = "";

        // Parse tees if stored as string (from Supabase)
        let tees = course.tees;
        if (typeof tees === "string") {
          try { tees = JSON.parse(tees); } catch { tees = {}; }
        }

        // API structure: tees.male[0].holes or tees.female[0].holes
        if (tees) {
          // Prefer male tees, fall back to female
          const teeGroups = tees.male || tees.female || [];
          if (Array.isArray(teeGroups) && teeGroups.length) {
            // Find true 18-hole tee sets (back 9 differs from front 9)
            const isTrue18 = (t) => {
              if (!t.holes || t.holes.length < 18) return false;
              // Check if back 9 yardages differ from front 9 (not just repeated)
              for (let i = 0; i < 9; i++) {
                if (t.holes[i]?.yardage !== t.holes[i+9]?.yardage) return true;
              }
              return false;
            };
            const true18 = teeGroups.filter(isTrue18);
            const best = true18.length > 0
              ? true18.reduce((a, b) => (b.total_yards || 0) > (a.total_yards || 0) ? b : a)
              : (teeGroups.find(t => t.holes && t.holes.length >= 18) || teeGroups[0]);
            holes = best.holes || [];
            teeName = best.tee_name || "";
          }
        }

        // Fallback: flat holes array
        if (!holes.length && Array.isArray(course.holes)) {
          holes = course.holes;
        }

        if (holes.length) {
          holes.slice(0, 18).forEach((h, i) => {
            const par = Number(h.par || 0);
            if (par >= 3 && par <= 6) pars[i] = par;
            const yd = Number(h.yardage || 0);
            if (yd > 0) yardages[i] = yd;
          });
        }

        const name = course.club_name || course.course_name || course.name || "Unknown Course";
        onSelectCourse({ name, pars, yardages, tee: teeName });
        setSelectedCourse(null);
      };

      const applyCustomCourse = (course) => {
        onSelectCourse({ name: course.name, pars: course.pars });
      };

      const saveCustomCourse = () => {
        if (!newCourseName.trim()) return;
        const course = {
          id: Date.now().toString(),
          name: newCourseName.trim(),
          state: newCourseState,
          pars: [...newCoursePars],
        };
        saveCustomCourses([...customCourses, course]);
        setNewCourseName(""); setNewCourseState(""); setNewCoursePars(Array(18).fill(4));
      };

      const inputStyle = {
        background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 8,
        color: "var(--text)", padding: "8px 12px", fontSize: 15, outline: "none", width: "100%",
      };

      return (
        <div>
          {/* Sub tabs */}
          <div style={{ display: "flex", background: "var(--surface)", borderRadius: 10, border: "1px solid var(--surface2)", padding: 3, marginBottom: 14 }}>
            {[{id:"search",label:"🔍 Search"},{id:"favorites",label:"⭐ Favorites"},{id:"custom",label:"✏️ My Courses"}].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex: 1, border: "none", borderRadius: 8, fontSize: 13,
                background: tab === t.id ? "#166534" : "transparent",
                color: tab === t.id ? "#4ade80" : "var(--text3)",
                fontWeight: 700, padding: "7px 4px", cursor: "pointer", transition: "all 0.15s",
              }}>{t.label}</button>
            ))}
          </div>

          {/* SEARCH TAB */}
          {tab === "search" && (
            <div>
              <select value={country} onChange={e => { setCountry(e.target.value); setState(""); }}
                style={{ ...inputStyle, marginBottom: 8 }}>
                <option value="">All Countries</option>
                {countries.filter(Boolean).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              {(country === "United States" || country === "") && (
                <select value={state} onChange={e => setState(e.target.value)}
                  style={{ ...inputStyle, marginBottom: 8 }}>
                  <option value="">All States</option>
                  {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              )}
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input value={query} onChange={e => setQuery(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && searchCourses()}
                  placeholder="Part of course name (e.g. Creek, Ridge...)"
                  style={{ ...inputStyle, flex: 1 }} />
                <button onClick={searchCourses} style={{
                  background: "#166534", color: "#4ade80", border: "none",
                  borderRadius: 8, padding: "8px 14px", fontWeight: 700, fontSize: 15, cursor: "pointer",
                }}>{loading ? "..." : "Search"}</button>
              </div>
              {error && <div style={{ color: "#f87171", fontSize: 14, marginBottom: 10 }}>{error}</div>}
              {results.length > 0 && (
                <div style={{ color: "var(--text3)", fontSize: 13, marginBottom: 8 }}>Showing {results.length} courses</div>
              )}
              {loading && <div style={{ color: "var(--text3)", fontSize: 15, textAlign: "center", padding: 20 }}>Loading...</div>}
              {!courseIndex && !indexError && (
                <div style={{ color: "var(--text3)", fontSize: 15, textAlign: "center", padding: 20 }}>Loading course list...</div>
              )}


              {/* Course detail view */}
              {selectedCourse && (
                <div style={{ background: "var(--surface)", borderRadius: 12, padding: 14, border: "1px solid #166534", marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div>
                      <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 16 }}>{selectedCourse.club_name || selectedCourse.name}</div>
                      <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>{selectedCourse.location?.city || selectedCourse.city || ""}{(selectedCourse.location?.city || selectedCourse.city) ? ", " : ""}{selectedCourse.location?.state || selectedCourse.state || state}</div>
                    </div>
                    <button onClick={() => { setSelectedCourse(null); setSelectedTee(null); }} style={{ background: "none", border: "none", color: "var(--text3)", fontSize: 18, cursor: "pointer" }}>✕</button>
                  </div>
                  {(() => {
                    // Parse tees
                    let tees = selectedCourse.tees;
                    if (typeof tees === "string") { try { tees = JSON.parse(tees); } catch { tees = {}; } }
                    // Build a flat list of all tee options (male + female), labeled
                    const allTees = [];
                    if (tees && tees.male) tees.male.forEach(t => allTees.push({ ...t, gender: "M" }));
                    if (tees && tees.female) tees.female.forEach(t => allTees.push({ ...t, gender: "F" }));
                    // Only show real 18-hole tees
                    const valid = allTees.filter(t => t.holes && t.holes.length >= 18);
                    // Pick default tee: the selected one, or the longest male
                    const activeTee = selectedTee || valid.find(t => t.gender === "M") || valid[0];
                    const holes = activeTee ? activeTee.holes : (selectedCourse.holes || []);
                    return (
                      <React.Fragment>
                        {valid.length > 0 && (
                          <div style={{ marginBottom: 10 }}>
                            <div style={{ color: "var(--text3)", fontSize: 13, fontWeight: 700, letterSpacing: "0.05em", marginBottom: 6 }}>SELECT TEES</div>
                            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
                              {valid.map((t, ti) => {
                                const isActive = activeTee && t.tee_name === activeTee.tee_name && t.gender === activeTee.gender && t.total_yards === activeTee.total_yards;
                                return (
                                  <button key={ti} onClick={() => setSelectedTee(t)}
                                    style={{ flexShrink: 0, padding: "8px 12px", borderRadius: 10, border: isActive ? "2px solid #4ade80" : "1px solid var(--border)", background: isActive ? "#166534" : "var(--surface2)", color: isActive ? "#4ade80" : "var(--text2)", cursor: "pointer", textAlign: "left" }}>
                                    <div style={{ fontSize: 14, fontWeight: 700 }}>{t.tee_name} {t.gender === "F" ? "♀" : ""}</div>
                                    <div style={{ fontSize: 12, opacity: 0.8, marginTop: 1 }}>{t.total_yards} yds</div>
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                        {activeTee && (
                          <div style={{ display: "flex", gap: 14, marginBottom: 10, padding: "8px 12px", background: "var(--surface3)", borderRadius: 10, fontSize: 13 }}>
                            <div><span style={{ color: "var(--text3)" }}>Rating </span><span style={{ color: "#4ade80", fontWeight: 700 }}>{activeTee.course_rating || "—"}</span></div>
                            <div><span style={{ color: "var(--text3)" }}>Slope </span><span style={{ color: "#4ade80", fontWeight: 700 }}>{activeTee.slope_rating || "—"}</span></div>
                            <div><span style={{ color: "var(--text3)" }}>Yards </span><span style={{ color: "#4ade80", fontWeight: 700 }}>{activeTee.total_yards || "—"}</span></div>
                            <div><span style={{ color: "var(--text3)" }}>Par </span><span style={{ color: "#4ade80", fontWeight: 700 }}>{activeTee.par_total || "—"}</span></div>
                          </div>
                        )}
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(9, 1fr)", gap: 4, marginBottom: 6 }}>
                          {holes.slice(0, 18).map((h, i) => (
                            <div key={i} style={{ textAlign: "center" }}>
                              <div style={{ color: "var(--text3)", fontSize: 12, fontWeight: 600 }}>{i+1}</div>
                              <div style={{ background: "var(--surface2)", borderRadius: 4, padding: "3px 0", color: "#4ade80", fontSize: 14, fontWeight: 700 }}>{h.par || "?"}</div>
                              {h.yardage ? <div style={{ color: "var(--text4)", fontSize: 11, marginTop: 1 }}>{h.yardage}</div> : null}
                            </div>
                          ))}
                          {!holes.length && <div style={{ gridColumn: "span 9", color: "var(--text3)", fontSize: 13, padding: "8px 0" }}>Par data not available</div>}
                        </div>
                      </React.Fragment>
                    );
                  })()}
                  {selectedCourse._debugKeys && (
                    <div style={{ background: "#0a0a0a", borderRadius: 6, padding: "8px 10px", marginBottom: 10, fontSize: 12, color: "#f59e0b", wordBreak: "break-all" }}>
                      <div>Keys: {selectedCourse._debugKeys}</div>
                      {selectedCourse._debugTeeKeys && <div>Tee[0] keys: {selectedCourse._debugTeeKeys}</div>}
                      {selectedCourse._debugHoleKeys && <div>Hole[0] keys: {selectedCourse._debugHoleKeys}</div>}
                    </div>
                  )}
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => {
                      // Apply the selected tee's holes if one is chosen
                      if (selectedTee && selectedTee.holes) {
                        applyCoursePars({ ...selectedCourse, tees: { male: [selectedTee] } });
                      } else {
                        applyCoursePars(selectedCourse);
                      }
                    }} style={{
                      flex: 2, padding: "10px", background: "#166534", border: "none",
                      borderRadius: 8, color: "#4ade80", fontWeight: 700, fontSize: 15, cursor: "pointer",
                    }}>▶ Start Your Round</button>
                    <button onClick={() => toggleFav({ id: selectedCourse.id || selectedCourse.club_id, name: selectedCourse.club_name || selectedCourse.name, state, holes: selectedCourse.holes || selectedCourse.tees?.[0]?.holes || [], tees: selectedCourse.tees || null })} style={{
                      flex: 1, padding: "10px", background: isFav(selectedCourse.id || selectedCourse.club_id) ? "#78350f" : "var(--surface2)",
                      border: "none", borderRadius: 8,
                      color: isFav(selectedCourse.id || selectedCourse.club_id) ? "#fbbf24" : "var(--text3)",
                      fontWeight: 700, fontSize: 15, cursor: "pointer",
                    }}>{isFav(selectedCourse.id || selectedCourse.club_id) ? "★ Saved" : "☆ Fav"}</button>
                  </div>
                </div>
              )}

              {/* Results list */}
              {!selectedCourse && results.map((c, i) => (
                <button key={i} onClick={() => selectCourse(c)} style={{
                  width: "100%", background: "var(--surface)", border: "1px solid var(--surface2)",
                  borderRadius: 10, padding: "12px 14px", marginBottom: 8,
                  textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
                }}>
                  <div>
                    <div style={{ color: "var(--text)", fontWeight: 600, fontSize: 15 }}>
                      {c.club_name || c.name}
                      {c.course_name && c.course_name !== c.club_name && !(c.club_name||"").includes(c.course_name) ? <span style={{ color: "#4ade80", fontWeight: 500 }}> · {c.course_name}</span> : null}
                    </div>
                    <div style={{ color: "var(--text3)", fontSize: 13, marginTop: 2 }}>
                      {[
                        c.location?.city && c.location.city !== "Unknown" ? c.location.city : null,
                        c.location?.state && c.location.state !== "Unknown" ? c.location.state : null,
                        c.location?.country && c.location.country !== "United States" && c.location.country !== "Unknown" ? c.location.country : null,
                      ].filter(Boolean).join(", ")}
                      {" · "}{c.number_of_holes || 18} holes
                    </div>
                  </div>
                  <span style={{ color: "#4ade80", fontSize: 18 }}>›</span>

            </div>

                      <div style={{ color: "var(--text3)", fontSize: 13, marginTop: 2 }}>{c.state}</div>
                    </div>

                          // Save fetched tees back into this favorite so future taps are instant

                    }}>{favLoadingId === i ? "✓ Use Course…" : "✓ Use Course"}</button>
                    <button onClick={() => saveFavorites(favorites.filter((_, fi) => fi !== i))} style={{
                      flex: 1, padding: "8px", background: "transparent", border: "none", borderLeft: "1px solid var(--surface2)",
                      color: "#ef4444", fontSize: 13, fontWeight: 600, cursor: "pointer",
                    }}>✕ Remove</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* CUSTOM COURSES TAB */}
          {tab === "custom" && (
            <div>
              {/* Build new course */}
              <div style={{ background: "var(--surface)", borderRadius: 12, padding: 14, border: "1px solid var(--surface2)", marginBottom: 14 }}>
                <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 15, marginBottom: 10 }}>Build a Course</div>
                <input value={newCourseName} onChange={e => setNewCourseName(e.target.value)}
                  placeholder="Course name" style={{ ...inputStyle, marginBottom: 8 }} />
                <select value={newCourseState} onChange={e => setNewCourseState(e.target.value)}

                <div style={{ display: "grid", gridTemplateColumns: "repeat(9, 1fr)", gap: 4, marginBottom: 10 }}>
                  {newCoursePars.map((par, i) => (
                    <div key={i} style={{ textAlign: "center" }}>
                      <div style={{ color: "var(--text3)", fontSize: 12, fontWeight: 600, marginBottom: 2 }}>{i+1}</div>
                      <select value={par} onChange={e => {

                <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--surface2)", borderRadius: 10, marginBottom: 8, overflow: "hidden" }}>

                    <div style={{ color: "var(--text)", fontWeight: 600, fontSize: 15 }}>{c.name}</div>
                    <div style={{ color: "var(--text3)", fontSize: 13, marginTop: 2 }}>{c.state || "Custom"} · Par {c.pars.reduce((a,b)=>a+b,0)}</div>

                      flex: 1, padding: "8px", background: "transparent", border: "none", borderLeft: "1px solid var(--surface2)",

                  </div>
