      );
    }

    // ── SummaryView ──────────────────────────────────────────────────
    function SummaryView({ round }) {
      const played = round.holes.filter(h => h.score !== "");
      if (played.length === 0) return <div style={{ color: "var(--text4)", textAlign: "center", padding: "32px 0", fontSize: 16 }}>Enter scores to see your summary.</div>;
      const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const totalPutts = played.filter(h => h.putts !== "").reduce((s, h) => s + Number(h.putts), 0);
      const fwHoles    = played.filter(h => h.fairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.fairway === "hit").length;
      const girCount   = played.filter(h => h.gir === true).length;
      const diff       = totalScore - totalPar;
      const puttCount  = played.filter(h => h.putts !== "").length;
      const stats = [
        { label: "Score", value: totalScore, sub: diff === 0 ? "Even" : diff > 0 ? `+${diff}` : `${diff}` },
        { label: "Putts", value: puttCount ? totalPutts : "—", sub: puttCount ? `${(totalPutts/puttCount).toFixed(1)}/hole` : "" },
        { label: "FIR", value: fwHoles.length ? `${fwHit}/${fwHoles.length}` : "—", sub: fwHoles.length ? `${Math.round(fwHit/fwHoles.length*100)}%` : "" },
        { label: "GIR", value: played.length ? `${girCount}/${played.length}` : "—", sub: played.length ? `${Math.round(girCount/played.length*100)}%` : "" },
      ];
      const breakdown = { eagle: 0, birdie: 0, par: 0, bogey: 0, double: 0, worse: 0 };
      played.forEach(h => {
        const d = Number(h.score) - Number(h.par);
        if (d <= -2) breakdown.eagle++; else if (d === -1) breakdown.birdie++; else if (d === 0) breakdown.par++; else if (d === 1) breakdown.bogey++; else if (d === 2) breakdown.double++; else breakdown.worse++;
      });
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
            {stats.map(s => (
              <div key={s.label} style={{ background: "var(--surface)", borderRadius: 12, padding: "14px 16px", border: "1px solid var(--surface2)" }}>
                <div style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>{s.label}</div>
                <div style={{ color: "var(--text)", fontSize: 26, fontWeight: 800, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
                <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>{s.sub}</div>
              </div>
            ))}
          </div>
          <div style={{ background: "var(--surface)", borderRadius: 12, padding: "14px 16px", border: "1px solid var(--surface2)" }}>
            <div style={{ color: "var(--text3)", fontSize: 13, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Score Breakdown</div>
            {[
              { key: "eagle", label: "Eagle+", color: "#f59e0b" }, { key: "birdie", label: "Birdie", color: "#22c55e" },
              { key: "par", label: "Par", color: "#3b82f6" }, { key: "bogey", label: "Bogey", color: "#f87171" },
              { key: "double", label: "Double", color: "#ef4444" }, { key: "worse", label: "Triple+", color: "#dc2626" },
            ].filter(r => breakdown[r.key] > 0).map(r => (
              <div key={r.key} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: r.color, flexShrink: 0 }} />
                <div style={{ color: "var(--text2)", fontSize: 15, flex: 1 }}>{r.label}</div>
                <div style={{ background: r.color+"22", color: r.color, borderRadius: 20, padding: "1px 9px", fontSize: 14, fontWeight: 700 }}>{breakdown[r.key]}</div>
                <div style={{ background: "var(--surface2)", borderRadius: 6, height: 6, flex: 2, overflow: "hidden" }}>
                  <div style={{ width: `${breakdown[r.key]/played.length*100}%`, height: "100%", background: r.color, borderRadius: 6 }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── CHGSSummary ──────────────────────────────────────────────────
    function CHGSSummary({ round }) {
      const played = round.holes.filter(h => h.chgsScore !== "");
      if (played.length === 0) return <div style={{ color: "var(--text4)", textAlign: "center", padding: "32px 0", fontSize: 16 }}>Enter CHGS stats to see your summary.</div>;
      const totalScore = played.reduce((s, h) => s + Number(h.chgsScore), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const diff       = totalScore - totalPar;
      const fwHoles    = played.filter(h => h.chgsFairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.chgsFairway === "hit").length;
      const g80plus    = played.filter(h => h.greenPlus80 === true || h.greenPlus80 === false);
      const g80plusHit = g80plus.filter(h => h.greenPlus80 === true).length;
      const g80minus   = played.filter(h => h.greenMinus80 === true || h.greenMinus80 === false);
      const g80minHit  = g80minus.filter(h => h.greenMinus80 === true).length;
      const udHoles    = played.filter(h => h.upAndDown === true || h.upAndDown === false);
      const udMade     = udHoles.filter(h => h.upAndDown === true).length;
      const puttHoles  = played.filter(h => h.chgsPutts !== "");
      const totalPutts = puttHoles.reduce((s, h) => s + Number(h.chgsPutts), 0);
      const cards = [
        { label: "Score", value: totalScore, sub: diff === 0 ? "Even par" : diff > 0 ? `+${diff} over` : `${diff} under`, accent: "#60a5fa" },
        { label: "Fairway", value: fwHoles.length ? `${fwHit}/${fwHoles.length}` : "—", sub: fwHoles.length ? `${Math.round(fwHit/fwHoles.length*100)}% hit` : "", accent: "#4ade80" },
        { label: "Green +80 yds", value: g80plus.length ? `${g80plusHit}/${g80plus.length}` : "—", sub: g80plus.length ? `${Math.round(g80plusHit/g80plus.length*100)}% hit` : "", accent: "#f59e0b" },
        { label: "Green -80 yds", value: g80minus.length ? `${g80minHit}/${g80minus.length}` : "—", sub: g80minus.length ? `${Math.round(g80minHit/g80minus.length*100)}% hit` : "", accent: "#a78bfa" },
        { label: "Up & Down", value: udHoles.length ? `${udMade}/${udHoles.length}` : "—", sub: udHoles.length ? `${Math.round(udMade/udHoles.length*100)}% converted` : "", accent: "#f472b6" },
        { label: "Putts", value: puttHoles.length ? totalPutts : "—", sub: puttHoles.length ? `${(totalPutts/puttHoles.length).toFixed(1)} / hole` : "", accent: "#34d399" },
      ];
      return (
        <div>
          <div style={{ background: "var(--surface-blue)", borderRadius: 10, padding: "10px 14px", marginBottom: 14, border: "1px solid #1e40af44", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ fontWeight: 800, fontSize: 15, color: "#60a5fa", letterSpacing: "0.04em" }}>CHGS</div>
            <div style={{ color: "var(--text3)", fontSize: 14 }}>Christopher Howard Golf School</div>
            <div style={{ marginLeft: "auto", color: "var(--text)", fontWeight: 800, fontSize: 16 }}>
              {totalScore} <span style={{ color: diff < 0 ? "#4ade80" : diff > 0 ? "#f87171" : "var(--text3)", fontSize: 15 }}>({diff === 0 ? "E" : diff > 0 ? "+"+diff : diff})</span>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9 }}>
            {cards.map(c => (
              <div key={c.label} style={{ background: "var(--surface)", borderRadius: 12, padding: "13px 14px", border: `1px solid ${c.accent}33` }}>
                <div style={{ color: "var(--text3)", fontSize: 12, fontWeight: 700, letterSpacing: "0.09em", textTransform: "uppercase" }}>{c.label}</div>
                <div style={{ color: "var(--text)", fontSize: 24, fontWeight: 800, lineHeight: 1.1, marginTop: 3 }}>{c.value}</div>
                {c.sub && <div style={{ color: c.accent, fontSize: 13, marginTop: 2, fontWeight: 600 }}>{c.sub}</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────
    const STORAGE_KEY = "golflog_rounds";
    const COURSES_KEY = "golflog_custom_courses";
    const FAVORITES_KEY = "golflog_favorites";

    const US_STATES = [
      "Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut",
      "Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa",
      "Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan",
      "Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire",
      "New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio",
      "Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota",
      "Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia",
      "Wisconsin","Wyoming"
    ];

    function GolfStatsApp() {
      const [lightMode, setLightMode] = useState(() => {
        try { return localStorage.getItem("golflog_theme") === "light"; } catch { return false; }
      });
      React.useEffect(() => {
        if (lightMode) document.body.classList.add("light");
        else document.body.classList.remove("light");
        try { localStorage.setItem("golflog_theme", lightMode ? "light" : "dark"); } catch {}
      }, [lightMode]);
      const [rounds, setRounds] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) return JSON.parse(saved);
        } catch {}
        return [defaultRound()];
      });
      const [activeRound, setActiveRound] = useState(() => {
        try {
          const saved = parseInt(localStorage.getItem("golflog_active_round"));
          const roundsData = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          if (!isNaN(saved) && saved >= 0 && saved < roundsData.length) return saved;
        } catch {}
        return 0;
      });
      const [view, setView] = useState("scorecard");
      const [activeHalf, setActiveHalf] = useState("front");
      const [chgsTab, setChgsTab] = useState("entry");
      const [showShare, setShowShare] = useState(false);
      const [sharedRound, setSharedRound] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);

      // Save to localStorage whenever rounds change
      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(rounds)); } catch {}
      }, [rounds]);

      // Persist which round is active so refresh returns to it
      useEffect(() => {
        try { localStorage.setItem("golflog_active_round", String(activeRound)); } catch {}
      }, [activeRound]);

      // Load shared round from URL
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get("round");
        if (encoded) {
          const r = decodeRound(encoded);
          if (r) {
            // Show shared round in a read-only view, don't merge into saved rounds
            setSharedRound(r);
            setView("shared");
            // Clean the URL so refreshing doesn't re-trigger
            window.history.replaceState({}, "", window.location.pathname);
          }
        }
      }, []);

      const round = rounds[activeRound] || rounds[0];

      const updateHole = (i, updated) => {
        setRounds(prev => prev.map((r, ri) => ri !== activeRound ? r : { ...r, holes: r.holes.map((h, hi) => hi === i ? updated : h) }));
      };
      const updateRoundMeta = (field, value) => {
        setRounds(prev => prev.map((r, i) => i === activeRound ? { ...r, [field]: value } : r));
      };
      const addRound = () => {
        const nr = [...rounds, defaultRound()];
        setRounds(nr); setActiveRound(nr.length - 1); setView("scorecard"); setActiveHalf("front");
      };
      const onSelectCourse = ({ name, pars, yardages, tee }) => {
        // Apply course name, tee, hole pars, and yardages to current round (functional update)
        setRounds(prev => prev.map((r, ri) => ri !== activeRound
          ? r
          : { ...r, course: name, tee: tee !== undefined ? tee : r.tee, holes: r.holes.map((h, i) => ({
              ...h,
              par: pars[i] !== undefined ? pars[i] : h.par,
              yardage: yardages && yardages[i] !== undefined ? yardages[i] : h.yardage,
            })) }
        ));
        setView("scorecard");
      };

      const deleteRound = (i) => {
        const nr = rounds.filter((_, ri) => ri !== i);
        const newRounds = nr.length ? nr : [defaultRound()];
        setRounds(newRounds);
        setActiveRound(Math.min(activeRound, newRounds.length - 1));
        setDeleteConfirm(null);
      };

      const holeRange = activeHalf === "front" ? [0, 9] : [9, 18];
      const displayHoles = round.holes.slice(...holeRange);

      const totalScoreStr = (() => {
        const played = round.holes.filter(h => h.score !== "");
        if (!played.length) return "";
        const s = played.reduce((a, h) => a + Number(h.score), 0);
        const p = played.reduce((a, h) => a + Number(h.par), 0);
        const d = s - p;
        return `${s} (${d === 0 ? "E" : d > 0 ? "+"+d : d})`;
      })();

      const navTabs = [
        { id: "scorecard", label: "Scorecard" }, { id: "summary", label: "Summary" },
        { id: "chgs", label: "CHGS" }, { id: "courses", label: "Courses" },
        { id: "rounds", label: "Rounds" },
        ...(view === "shared" ? [{ id: "shared", label: "📎 Shared" }] : []),
      ];

      return (
        <div id="app-root" style={{ minHeight: "100vh", background: "var(--bg)", fontFamily: "'Inter', system-ui, sans-serif", color: "var(--text)", maxWidth: 430, margin: "0 auto" }}>
          <PrintView round={round} />
          {showShare && <ShareModal
            round={round}
            allRounds={rounds}
            onClose={() => setShowShare(false)}
            onImport={(imported) => {
              const merged = [...rounds];
              imported.forEach(r => {
                const exists = merged.some(m => m.date === r.date && m.course === r.course);
                if (!exists) merged.push(r);
              });
              setRounds(merged);
              setShowShare(false);
            }}
          />}

          {/* Top bar */}
          <div className="no-print" style={{ background: "var(--bg)", position: "sticky", top: 0, zIndex: 10, padding: "16px 16px 0", borderBottom: "1px solid var(--surface2)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 22 }}>⛳</span>
                  <span style={{ fontWeight: 800, fontSize: 18, letterSpacing: "-0.02em" }}>GolfLog</span><span style={{ fontSize: 13, color: "var(--text3)", marginLeft: 4, fontWeight: 600 }}>v44</span>
                </div>
                {totalScoreStr && <div style={{ color: "#4ade80", fontWeight: 700, fontSize: 15, marginTop: 1, paddingLeft: 30 }}>{totalScoreStr}</div>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button id="theme-toggle" onClick={() => setLightMode(!lightMode)} title="Toggle light/dark" style={{ background: "var(--surface-blue)", color: "#fbbf24", border: "none", borderRadius: 8, padding: "7px 10px", fontWeight: 700, fontSize: 16, cursor: "pointer" }}>{lightMode ? "🌙" : "☀️"}</button>
                <button onClick={() => setShowShare(true)} style={{ background: "var(--surface-blue)", color: "#60a5fa", border: "none", borderRadius: 8, padding: "7px 12px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>↑ Share</button>
                <button onClick={addRound} style={{ background: "#166534", color: "#4ade80", border: "none", borderRadius: 8, padding: "7px 12px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>+ New</button>
              </div>
            </div>
            <div style={{ display: "flex" }}>
              {navTabs.map(({ id, label }) => {
                const isActive = view === id;
                const ac = id === "chgs" ? "#60a5fa" : "#4ade80";
                return (
                  <button key={id} onClick={() => setView(id)} style={{
                    flex: 1, padding: "8px 0", border: "none", background: "transparent",
                    color: isActive ? ac : "var(--text3)", fontWeight: 700, fontSize: 13, cursor: "pointer",
                    borderBottom: isActive ? `2px solid ${ac}` : "2px solid transparent",
                    letterSpacing: "0.03em", transition: "color 0.15s",
                  }}>{label}</button>
                );
              })}
            </div>
          </div>

          <div className="no-print" style={{ padding: 14 }}>

            {view === "scorecard" && (
              <>
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  <input value={round.course} onChange={e => updateRoundMeta("course", e.target.value)} placeholder="Course name"
                    style={{ flex: 2, background: "var(--surface)", border: "1px solid var(--surface2)", borderRadius: 9, padding: "8px 12px", color: "var(--text)", fontSize: 15, outline: "none" }} />
                  <input type="date" value={round.date} onChange={e => updateRoundMeta("date", e.target.value)}
                    style={{ flex: 1, background: "var(--surface)", border: "1px solid var(--surface2)", borderRadius: 9, padding: "8px 10px", color: "var(--text3)", fontSize: 14, outline: "none", colorScheme: "dark" }} />
                </div>
                {round.tee && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: -8, marginBottom: 14, fontSize: 13, color: "var(--text3)" }}>
                    <span>Tees:</span>
                    <span style={{ color: "#4ade80", fontWeight: 700 }}>{round.tee}</span>
                    <button onClick={() => updateRoundMeta("tee", "")} title="Clear tee"
                      style={{ background: "none", border: "none", color: "var(--text3)", fontSize: 13, cursor: "pointer", marginLeft: 2 }}>✕</button>
                  </div>
                )}
                <div style={{ display: "flex", background: "var(--surface)", borderRadius: 10, border: "1px solid var(--surface2)", padding: 3, marginBottom: 14 }}>
                  {["front","back"].map(half => (
                    <button key={half} onClick={() => setActiveHalf(half)} style={{
                      flex: 1, border: "none", borderRadius: 8, background: activeHalf === half ? "#166534" : "transparent",
                      color: activeHalf === half ? "#4ade80" : "var(--text3)", fontWeight: 700, fontSize: 15, padding: "7px 0", cursor: "pointer", transition: "all 0.15s",
                    }}>{half === "front" ? "Front 9 (1–9)" : "Back 9 (10–18)"}</button>
                  ))}
                </div>
                {displayHoles.map((hole, i) => {
                  const holeIndex = holeRange[0] + i;
                  return <HoleCard key={holeIndex} hole={hole} holeNum={holeIndex+1} onChange={u => updateHole(holeIndex, u)} />;
                })}
              </>
            )}

            {view === "summary" && (
              <>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 15 }}>{round.course || "Untitled Round"}</div>
                  <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>{round.date}</div>
                </div>
                <SummaryView round={round} />
              </>
            )}

            {view === "chgs" && (
              <>
                {round.tee && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10, fontSize: 13, color: "var(--text3)" }}>
                    <span>Tees:</span>
                    <span style={{ color: "#4ade80", fontWeight: 700 }}>{round.tee}</span>
                  </div>
                )}
                <div style={{ display: "flex", background: "var(--surface)", borderRadius: 10, border: "1px solid var(--surface2)", padding: 3, marginBottom: 14 }}>
                  {[{id:"entry",label:"Enter Stats"},{id:"chgssummary",label:"Summary"}].map(t => (
                    <button key={t.id} onClick={() => setChgsTab(t.id)} style={{
                      flex: 1, border: "none", borderRadius: 8, background: chgsTab === t.id ? "var(--surface-blue)" : "transparent",
                      color: chgsTab === t.id ? "#60a5fa" : "var(--text3)", fontWeight: 700, fontSize: 15, padding: "7px 0", cursor: "pointer", transition: "all 0.15s",
                    }}>{t.label}</button>
                  ))}
                </div>
                {chgsTab === "entry" && (
                  <>
                    <div style={{ display: "flex", background: "var(--surface)", borderRadius: 10, border: "1px solid var(--surface2)", padding: 3, marginBottom: 14 }}>
                      {["front","back"].map(half => (
                        <button key={half} onClick={() => setActiveHalf(half)} style={{
                          flex: 1, border: "none", borderRadius: 8, background: activeHalf === half ? "var(--surface-blue)" : "transparent",
                          color: activeHalf === half ? "#60a5fa" : "var(--text3)", fontWeight: 700, fontSize: 15, padding: "7px 0", cursor: "pointer", transition: "all 0.15s",
                        }}>{half === "front" ? "Front 9 (1–9)" : "Back 9 (10–18)"}</button>
                      ))}
                    </div>
                    {displayHoles.map((hole, i) => {
                      const holeIndex = holeRange[0] + i;
                      return <CHGSHoleCard key={holeIndex} hole={hole} holeNum={holeIndex+1} onChange={u => updateHole(holeIndex, u)} />;
                    })}
                  </>
                )}
                {chgsTab === "chgssummary" && (
                  <>
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 15 }}>{round.course || "Untitled Round"}</div>
                      <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>{round.date}</div>
                    </div>
                    <CHGSSummary round={round} />
                  </>
                )}
              </>
            )}

            {view === "courses" && (
              <>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 15 }}>Course Selector</div>
                  <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>Search, favorite, or build your own courses. Selecting a course auto-fills hole pars for your current round.</div>
                </div>
                <CoursesTab onSelectCourse={onSelectCourse} />
              </>
            )}

            {view === "shared" && sharedRound && (
              <div>
                <div style={{ background: "var(--surface-blue)", borderRadius: 12, padding: "12px 14px", marginBottom: 14, border: "1px solid #1e40af44" }}>
                  <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 15, marginBottom: 4 }}>📎 Shared Round</div>
                  <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 15 }}>{sharedRound.course || "Untitled Round"}</div>
                  <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>{sharedRound.date}</div>
                  <button onClick={() => {
                    const exists = rounds.some(r => r.date === sharedRound.date && r.course === sharedRound.course);
                    if (!exists) {
                      const nr = [...rounds, sharedRound];
                      setRounds(nr);
                      setActiveRound(nr.length - 1);
                    } else {
                      const idx = rounds.findIndex(r => r.date === sharedRound.date && r.course === sharedRound.course);
                      setActiveRound(idx);
                    }
                    setSharedRound(null);
                    setView("summary");
                  }} style={{
                    marginTop: 10, width: "100%", padding: "9px", borderRadius: 8, border: "none",
                    background: "#166534", color: "#4ade80", fontWeight: 700, fontSize: 15, cursor: "pointer",
                  }}>+ Save to My Rounds</button>
                </div>
                <SummaryView round={sharedRound} />
                {sharedRound.holes.some(h => h.chgsScore !== "") && (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 15, marginBottom: 10, letterSpacing: "0.04em" }}>CHGS STATS</div>
                    <CHGSSummary round={sharedRound} />
                  </div>
                )}
              </div>
            )}

            {view === "rounds" && (
              <>
                <div style={{ color: "var(--text3)", fontSize: 14, marginBottom: 12, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  Saved Rounds ({rounds.length})
                </div>
                {rounds.map((r, i) => {
                  const played = r.holes.filter(h => h.score !== "");
                  const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
                  const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
                  const diff = totalScore - totalPar;
                  return (
                    <div key={i} style={{ marginBottom: 8 }}>
                      <div style={{
                        background: i === activeRound ? "#0c2218" : "var(--surface)",
                        border: i === activeRound ? "1px solid #166534" : "1px solid var(--surface2)",
                        borderRadius: 12, overflow: "hidden",
                      }}>
                        <button onClick={() => { setActiveRound(i); setView("scorecard"); }} style={{
                          width: "100%", background: "transparent", border: "none",
                          padding: "14px 16px", textAlign: "left", cursor: "pointer",
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                        }}>
                          <div>
                            <div style={{ color: "var(--text)", fontWeight: 700, fontSize: 16 }}>{r.course || "Untitled Round"}</div>
                            <div style={{ color: "var(--text3)", fontSize: 14, marginTop: 2 }}>{r.date} · {played.length}/18 holes</div>
                          </div>
                          {played.length > 0 && (
                            <div style={{ textAlign: "right" }}>
                              <div style={{ color: "var(--text)", fontWeight: 800, fontSize: 20 }}>{totalScore}</div>
                              <div style={{ color: diff < 0 ? "#4ade80" : diff > 0 ? "#f87171" : "var(--text3)", fontSize: 14, fontWeight: 700 }}>
                                {diff === 0 ? "E" : diff > 0 ? "+"+diff : diff}
                              </div>
                            </div>
                          )}
                        </button>
                        <div style={{ borderTop: "1px solid var(--surface2)", display: "flex" }}>
                          <button onClick={() => { setActiveRound(i); setView("summary"); }} style={{
                            flex: 1, padding: "8px", background: "transparent", border: "none",
                            color: "var(--text3)", fontSize: 13, fontWeight: 600, cursor: "pointer",
                          }}>📊 Summary</button>
                          <button onClick={() => { setActiveRound(i); setShowShare(true); }} style={{
                            flex: 1, padding: "8px", background: "transparent", border: "none", borderLeft: "1px solid var(--surface2)",
                            color: "#60a5fa", fontSize: 13, fontWeight: 600, cursor: "pointer",
                          }}>↑ Share</button>
                          <button onClick={() => setDeleteConfirm(i)} style={{
                            flex: 1, padding: "8px", background: "transparent", border: "none", borderLeft: "1px solid var(--surface2)",
                            color: "#ef4444", fontSize: 13, fontWeight: 600, cursor: "pointer",
                          }}>🗑 Delete</button>
                        </div>
                      </div>
                      {deleteConfirm === i && (
                        <div style={{ background: "#1c0a0a", border: "1px solid #7f1d1d", borderRadius: 10, padding: "12px 14px", marginTop: 6 }}>
                          <div style={{ color: "#f87171", fontSize: 15, fontWeight: 600, marginBottom: 10 }}>Delete this round? This cannot be undone.</div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={() => deleteRound(i)} style={{ flex: 1, padding: "8px", background: "#7f1d1d", border: "none", borderRadius: 8, color: "#fca5a5", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Yes, Delete</button>
                            <button onClick={() => setDeleteConfirm(null)} style={{ flex: 1, padding: "8px", background: "var(--surface2)", border: "none", borderRadius: 8, color: "var(--text3)", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Cancel</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GolfStatsApp />);
  </script>

  <script>
    // Auto-update: check for new version every 60s and on focus
    (function() {
      var CURRENT_VERSION = "44";
      var RELOAD_COOLDOWN_MS = 15000; // never reload more than once per 15s
      var MAX_ATTEMPTS_PER_VERSION = 4; // give up on a stuck CDN cache instead of looping forever

      function getReloadState() {
        try { return JSON.parse(sessionStorage.getItem("golflog_reload_state") || "{}"); } catch (e) { return {}; }
      }
      function setReloadState(s) {
        try { sessionStorage.setItem("golflog_reload_state", JSON.stringify(s)); } catch (e) {}
      }

      async function checkVersion() {
        try {
          var res = await fetch("version.json?t=" + Date.now(), { cache: "no-store" });
          if (!res.ok) return;
          var data = await res.json();
          var target = data.version && String(data.version);
          if (!target || target === CURRENT_VERSION) return;

          var state = getReloadState();
          var now = Date.now();
          if (state.version !== target) state = { version: target, attempts: 0, lastAttempt: 0 };
          if (state.attempts >= MAX_ATTEMPTS_PER_VERSION) return; // stuck stale cache — stop hammering
          if (now - (state.lastAttempt || 0) < RELOAD_COOLDOWN_MS) return;

          state.attempts += 1;
          state.lastAttempt = now;
          setReloadState(state);

          // Navigate to a cache-busted URL so we don't just get the same stale HTML back
          window.location.href = window.location.pathname + "?_=" + now;
        } catch (e) {}
      }
      // Check on load, on focus, and periodically
      window.addEventListener("focus", checkVersion);
      setInterval(checkVersion, 60000);
      checkVersion();
    })();
  </script>
