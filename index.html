<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#020617" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>GolfLog v6</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; font-family: 'Inter', system-ui, sans-serif; color: #f1f5f9; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    input, button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff; color: #000; }
      .print-card { background: #f8f8f8 !important; border: 1px solid #ccc !important; color: #000 !important; }
      .print-label { color: #555 !important; }
      .print-value { color: #000 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const HOLES = Array.from({ length: 18 }, (_, i) => i + 1);
    const PAR_OPTIONS = [3, 4, 5];

    const defaultHole = () => ({
      par: 4, score: "", putts: "",
      fairway: null, gir: null,
      chgsScore: "", chgsFairway: null,
      greenPlus80: null, greenMinus80: null,
      upAndDown: null, chgsPutts: "",
    });

    const defaultRound = () => ({
      course: "",
      date: new Date().toISOString().split("T")[0],
      holes: HOLES.map(() => defaultHole()),
    });

    // ── Encode/decode round to/from URL ──────────────────────────────
    function encodeRound(round) {
      try { return btoa(JSON.stringify(round)); } catch { return ""; }
    }
    function decodeRound(str) {
      try { return JSON.parse(atob(str)); } catch { return null; }
    }

    // ── Export all rounds as JSON file ──────────────────────────────
    function exportAllRounds(rounds) {
      try {
        const data = JSON.stringify(rounds, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `golflog-backup-${new Date().toISOString().split("T")[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return true;
      } catch { return false; }
    }

    function importRounds(file, onSuccess, onError) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) { onSuccess(data); }
          else { onError("Invalid file format"); }
        } catch { onError("Could not read file"); }
      };
      reader.readAsText(file);
    }

    // ── Text summary builder ─────────────────────────────────────────
    function buildTextSummary(round) {
      const played = round.holes.filter(h => h.score !== "");
      if (!played.length) return "No scores entered yet.";
      const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const diff       = totalScore - totalPar;
      const diffStr    = diff === 0 ? "E" : diff > 0 ? `+${diff}` : `${diff}`;
      const puttHoles  = played.filter(h => h.putts !== "");
      const totalPutts = puttHoles.reduce((s, h) => s + Number(h.putts), 0);
      const fwHoles    = played.filter(h => h.fairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.fairway === "hit").length;
      const girCount   = played.filter(h => h.gir === true).length;

      // CHGS
      const cp = round.holes.filter(h => h.chgsScore !== "");
      const g80p = cp.filter(h => h.greenPlus80 === true || h.greenPlus80 === false);
      const g80m = cp.filter(h => h.greenMinus80 === true || h.greenMinus80 === false);
      const ud   = cp.filter(h => h.upAndDown === true || h.upAndDown === false);
      const chgsFw = cp.filter(h => h.chgsFairway !== null && h.par !== 3);

      let text = `⛳ GOLF ROUND SUMMARY\n`;
      text += `━━━━━━━━━━━━━━━━━━━━\n`;
      text += `Course: ${round.course || "Untitled"}\n`;
      text += `Date:   ${round.date}\n\n`;
      text += `SCORECARD\n`;
      text += `Score:  ${totalScore} (${diffStr})\n`;
      if (puttHoles.length) text += `Putts:  ${totalPutts} (${(totalPutts/puttHoles.length).toFixed(1)}/hole)\n`;
      if (fwHoles.length)   text += `FIR:    ${fwHit}/${fwHoles.length} (${Math.round(fwHit/fwHoles.length*100)}%)\n`;
      text += `GIR:    ${girCount}/${played.length} (${Math.round(girCount/played.length*100)}%)\n`;

      if (cp.length) {
        text += `\nCHGS STATS\n`;
        if (chgsFw.length) text += `Fairway:     ${chgsFw.filter(h=>h.chgsFairway==="hit").length}/${chgsFw.length} (${Math.round(chgsFw.filter(h=>h.chgsFairway==="hit").length/chgsFw.length*100)}%)\n`;
        if (g80p.length)   text += `Green +80:   ${g80p.filter(h=>h.greenPlus80===true).length}/${g80p.length} (${Math.round(g80p.filter(h=>h.greenPlus80===true).length/g80p.length*100)}%)\n`;
        if (g80m.length)   text += `Green -80:   ${g80m.filter(h=>h.greenMinus80===true).length}/${g80m.length} (${Math.round(g80m.filter(h=>h.greenMinus80===true).length/g80m.length*100)}%)\n`;
        if (ud.length)     text += `Up & Down:   ${ud.filter(h=>h.upAndDown===true).length}/${ud.length} (${Math.round(ud.filter(h=>h.upAndDown===true).length/ud.length*100)}%)\n`;
      }

      text += `\nHOLE BY HOLE\n`;
      text += `H  Par Score\n`;
      round.holes.forEach((h, i) => {
        if (h.score === "") return;
        const d = Number(h.score) - Number(h.par);
        const badge = d <= -2 ? "Eagle" : d === -1 ? "Birdie" : d === 0 ? "Par" : d === 1 ? "Bogey" : d === 2 ? "Double" : `+${d}`;
        text += `${String(i+1).padStart(2)}   ${h.par}     ${h.score}   ${badge}\n`;
      });
      return text;
    }

    // ── Shared components ────────────────────────────────────────────
    const FairwayBtn = ({ value, active, onClick, color }) => (
      <button onClick={onClick} style={{
        padding: "4px 9px", borderRadius: 6, border: "none",
        background: active ? color : "#1e293b", color: active ? "#fff" : "#64748b",
        fontSize: 11, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
      }}>{value}</button>
    );

    const ToggleBtn = ({ label, active, onClick, activeColor }) => (
      <button onClick={onClick} style={{
        padding: "4px 10px", borderRadius: 6, border: "none",
        background: active ? activeColor : "#1e293b", color: active ? "#fff" : "#64748b",
        fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all 0.15s",
      }}>{label}</button>
    );

    const ScoreBadge = ({ score, par }) => {
      if (score === "" || score == null) return null;
      const diff = Number(score) - Number(par);
      const bg = diff <= -2 ? "#f59e0b" : diff === -1 ? "#22c55e" : diff === 0 ? "#3b82f6" : diff === 1 ? "#f87171" : "#dc2626";
      const label = diff <= -2 ? "Eagle" : diff === -1 ? "Birdie" : diff === 0 ? "Par" : diff === 1 ? "Bogey" : diff === 2 ? "Double" : `+${diff}`;
      return <span style={{ background: bg, color: "#fff", borderRadius: 5, padding: "1px 7px", fontSize: 11, fontWeight: 700, marginLeft: 6 }}>{label}</span>;
    };

    // ── Share Modal ──────────────────────────────────────────────────
    function ShareModal({ round, allRounds, onClose, onImport }) {
      const [toast, setToast] = useState("");

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

      const handleCopyText = () => {
        const text = buildTextSummary(round);
        navigator.clipboard.writeText(text).then(() => showToast("✓ Copied to clipboard!")).catch(() => {
          const el = document.createElement("textarea");
          el.value = text; document.body.appendChild(el); el.select();
          document.execCommand("copy"); document.body.removeChild(el);
          showToast("✓ Copied to clipboard!");
        });
      };

      const handleShareText = () => {
        const text = buildTextSummary(round);
        if (navigator.share) {
          navigator.share({ title: "Golf Round", text }).catch(() => {});
        } else { handleCopyText(); }
      };

      const handleShareLink = () => {
        const encoded = encodeRound(round);
        const url = `${window.location.origin}${window.location.pathname}?round=${encoded}`;
        if (navigator.share) {
          navigator.share({ title: "Golf Round", url }).catch(() => {});
        } else {
          navigator.clipboard.writeText(url).then(() => showToast("✓ Link copied!")).catch(() => showToast("✓ Link copied!"));
        }
      };

      const handlePDF = () => {
        window.print();
      };

      const btnStyle = (color) => ({
        width: "100%", padding: "13px 16px", borderRadius: 12, border: "none",
        background: color, color: "#fff", fontWeight: 700, fontSize: 14,
        cursor: "pointer", marginBottom: 10, textAlign: "left",
        display: "flex", alignItems: "center", gap: 12,
      });

      return (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)",
          zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center",
        }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "#0f172a", borderRadius: "20px 20px 0 0",
            padding: "24px 16px 36px", width: "100%", maxWidth: 430,
          }}>
            <div style={{ width: 40, height: 4, background: "#334155", borderRadius: 2, margin: "0 auto 20px" }} />
            <div style={{ color: "#f1f5f9", fontWeight: 800, fontSize: 17, marginBottom: 6 }}>Share Round</div>
            <div style={{ color: "#64748b", fontSize: 13, marginBottom: 20 }}>
              {round.course || "Untitled Round"} · {round.date}
            </div>

            <button onClick={handleShareText} style={btnStyle("#166534")}>
              <span style={{ fontSize: 20 }}>📋</span>
              <div>
                <div>Copy / Share as Text</div>
                <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Full summary you can paste into any message</div>
              </div>
            </button>

            <button onClick={handleShareLink} style={btnStyle("#1e3a5f")}>
              <span style={{ fontSize: 20 }}>🔗</span>
              <div>
                <div>Share Link</div>
                <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Anyone with the link sees your full round</div>
              </div>
            </button>

            <button onClick={handlePDF} style={btnStyle("#4a1d96")}>
              <span style={{ fontSize: 20 }}>📄</span>
              <div>
                <div>Save as PDF</div>
                <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Use your phone's print → Save as PDF</div>
              </div>
            </button>

            <button onClick={() => { if(exportAllRounds(allRounds)) showToast("✓ Backup file saved!"); else showToast("Could not save file"); }} style={btnStyle("#78350f")}>
              <span style={{ fontSize: 20 }}>💾</span>
              <div>
                <div>Export All Rounds</div>
                <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>Save a backup file of all rounds to your phone</div>
              </div>
            </button>

            <label style={{ ...btnStyle("#1a2e1a"), display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}>
              <span style={{ fontSize: 20 }}>📂</span>
              <div>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>Import Rounds</div>
                <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.8, marginTop: 2, color: "#fff" }}>Restore rounds from a backup file</div>
              </div>
              <input type="file" accept=".json" style={{ display: "none" }} onChange={e => {
                const file = e.target.files[0];
                if (!file) return;
                importRounds(file,
                  (data) => { onImport(data); showToast("✓ Rounds imported!"); },
                  (err) => showToast("❌ " + err)
                );
                e.target.value = "";
              }} />
            </label>

            <button onClick={onClose} style={{
              width: "100%", padding: "13px", borderRadius: 12, border: "none",
              background: "#1e293b", color: "#94a3b8", fontWeight: 700, fontSize: 14, cursor: "pointer",
            }}>Cancel</button>

            {toast && (
              <div style={{
                position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)",
                background: "#22c55e", color: "#fff", padding: "10px 20px",
                borderRadius: 20, fontWeight: 700, fontSize: 14, zIndex: 200,
              }}>{toast}</div>
            )}
          </div>
        </div>
      );
    }

    // ── Print View ───────────────────────────────────────────────────
    function PrintView({ round }) {
      const played = round.holes.filter(h => h.score !== "");
      const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const diff       = totalScore - totalPar;
      const diffStr    = diff === 0 ? "E" : diff > 0 ? `+${diff}` : `${diff}`;
      const puttHoles  = played.filter(h => h.putts !== "");
      const totalPutts = puttHoles.reduce((s, h) => s + Number(h.putts), 0);
      const fwHoles    = played.filter(h => h.fairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.fairway === "hit").length;
      const girCount   = played.filter(h => h.gir === true).length;

      return (
        <div style={{ display: "none" }} className="print-only">
          <style>{`@media print { .print-only { display: block !important; } .no-print { display: none !important; } body { background: white; color: black; font-family: sans-serif; } }`}</style>
          <h1 style={{ fontSize: 22, marginBottom: 4 }}>⛳ GolfLog</h1>
          <h2 style={{ fontSize: 16, fontWeight: 400, marginBottom: 16, color: "#555" }}>{round.course || "Untitled Round"} · {round.date}</h2>
          <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 20 }}>
            <thead>
              <tr style={{ background: "#f0f0f0" }}>
                {["Hole","Par","Score","+/-","Putts","FIR","GIR"].map(h => (
                  <th key={h} style={{ padding: "6px 8px", border: "1px solid #ddd", fontSize: 12 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {round.holes.map((h, i) => {
                const d = h.score !== "" ? Number(h.score) - Number(h.par) : null;
                return (
                  <tr key={i}>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{i+1}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{h.par}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12, fontWeight: 700 }}>{h.score || "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{d !== null ? (d === 0 ? "E" : d > 0 ? `+${d}` : d) : "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{h.putts || "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{h.par === 3 ? "N/A" : h.fairway === "hit" ? "✓" : h.fairway ? "✗" : "—"}</td>
                    <td style={{ padding: "5px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{h.gir === true ? "✓" : h.gir === false ? "✗" : "—"}</td>
                  </tr>
                );
              })}
              <tr style={{ background: "#f0f0f0", fontWeight: 700 }}>
                <td colSpan={2} style={{ padding: "6px 8px", border: "1px solid #ddd", fontSize: 12 }}>TOTAL</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{totalScore}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{diffStr}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{puttHoles.length ? totalPutts : "—"}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{fwHoles.length ? `${fwHit}/${fwHoles.length}` : "—"}</td>
                <td style={{ padding: "6px 8px", border: "1px solid #ddd", textAlign: "center", fontSize: 12 }}>{played.length ? `${girCount}/${played.length}` : "—"}</td>
              </tr>
            </tbody>
          </table>
          <p style={{ fontSize: 11, color: "#888" }}>Generated by GolfLog</p>
        </div>
      );
    }

    // ── HoleCard ─────────────────────────────────────────────────────
    function HoleCard({ hole, holeNum, onChange }) {
      const isParThree = hole.par === 3;
      return (
        <div style={{ background: "#0f172a", borderRadius: 14, padding: "14px 16px", border: "1px solid #1e293b", marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: "#166534", color: "#4ade80", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14 }}>{holeNum}</div>
              <div>
                <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 600, letterSpacing: "0.06em" }}>HOLE</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ color: "#f1f5f9", fontSize: 12, fontWeight: 600 }}>Par</span>
                  <div style={{ display: "flex", gap: 3 }}>
                    {PAR_OPTIONS.map(p => (
                      <button key={p} onClick={() => onChange({ ...hole, par: p, fairway: p === 3 ? null : hole.fairway })}
                        style={{ width: 24, height: 22, borderRadius: 5, border: "none", background: hole.par === p ? "#166534" : "#1e293b", color: hole.par === p ? "#4ade80" : "#64748b", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{p}</button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <input type="number" min="1" max="15" value={hole.score} onChange={e => onChange({ ...hole, score: e.target.value })} placeholder="—"
                style={{ width: 52, height: 40, borderRadius: 10, background: "#1e293b", border: "1px solid #334155", color: "#f1f5f9", fontSize: 22, fontWeight: 800, textAlign: "center", outline: "none" }} />
              <ScoreBadge score={hole.score} par={hole.par} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "#64748b", fontSize: 11, fontWeight: 600, letterSpacing: "0.06em" }}>PUTTS</span>
              <input type="number" min="0" max="10" value={hole.putts} onChange={e => onChange({ ...hole, putts: e.target.value })} placeholder="—"
                style={{ width: 38, height: 28, borderRadius: 7, background: "#1e293b", border: "1px solid #334155", color: "#f1f5f9", fontSize: 14, fontWeight: 700, textAlign: "center", outline: "none" }} />
            </div>
            {!isParThree && (
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ color: "#64748b", fontSize: 11, fontWeight: 600, letterSpacing: "0.06em" }}>FIR</span>
                <FairwayBtn value="◀" active={hole.fairway === "left"} color="#f59e0b" onClick={() => onChange({ ...hole, fairway: hole.fairway === "left" ? null : "left" })} />
                <FairwayBtn value="✓ Hit" active={hole.fairway === "hit"} color="#22c55e" onClick={() => onChange({ ...hole, fairway: hole.fairway === "hit" ? null : "hit" })} />
                <FairwayBtn value="▶" active={hole.fairway === "right"} color="#f59e0b" onClick={() => onChange({ ...hole, fairway: hole.fairway === "right" ? null : "right" })} />
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ color: "#64748b", fontSize: 11, fontWeight: 600, letterSpacing: "0.06em" }}>GIR</span>
              <button onClick={() => onChange({ ...hole, gir: hole.gir === true ? null : true })}
                style={{ padding: "3px 9px", borderRadius: 6, border: "none", background: hole.gir === true ? "#166534" : "#1e293b", color: hole.gir === true ? "#4ade80" : "#64748b", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Yes</button>
              <button onClick={() => onChange({ ...hole, gir: hole.gir === false ? null : false })}
                style={{ padding: "3px 9px", borderRadius: 6, border: "none", background: hole.gir === false ? "#7f1d1d" : "#1e293b", color: hole.gir === false ? "#f87171" : "#64748b", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>No</button>
            </div>
          </div>
        </div>
      );
    }

    // ── CHGSHoleCard ─────────────────────────────────────────────────
    function CHGSHoleCard({ hole, holeNum, onChange }) {
      const isParThree = hole.par === 3;
      return (
        <div style={{ background: "#0f172a", borderRadius: 14, padding: "13px 15px", border: "1px solid #1e3a5f", marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 11 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <div style={{ width: 30, height: 30, borderRadius: 8, background: "#1e3a5f", color: "#60a5fa", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13 }}>{holeNum}</div>
              <span style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600 }}>Par {hole.par}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "#64748b", fontSize: 11, fontWeight: 600, letterSpacing: "0.06em" }}>SCORE</span>
              <input type="number" min="1" max="15" value={hole.chgsScore}
                onChange={e => onChange({ ...hole, chgsScore: e.target.value, score: e.target.value })} placeholder="—"

      // Load unique countries from Supabase on mount
      React.useEffect(() => {
        const SURL = "https://koingualzctoyulzytxb.supabase.co";
        const SKEY = "sb_publishable_hjbdLga6ndmIsiq7jIdXGw_weKPNIQV";
        fetch(`${SURL}/rest/v1/courses?select=country&limit=1000`, {
          headers: { "apikey": SKEY, "Authorization": `Bearer ${SKEY}` }

      };

      const searchCourses = async () => {
        if (!state && !query.trim()) { setError("Please select a state or enter part of a course name."); return; }
        setLoading(true); setError(""); setResults([]);

        const COURSE_CACHE_KEY = "golflog_courses_";

          "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
          "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS",
          "Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA",
          "Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT",
          "Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM",
          "New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK",
          "Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
          "South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT",
          "Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"
        };
        const stateAbbr = state ? stateAbbrevs[state] : null;
        const SURL = "https://koingualzctoyulzytxb.supabase.co";
        const SKEY = "sb_publishable_hjbdLga6ndmIsiq7jIdXGw_weKPNIQV";

        try {
          if (!query.trim() && stateAbbr) {
            // State browse — check cache first
            const cacheKey = COURSE_CACHE_KEY + stateAbbr;
            try {
              const cached = localStorage.getItem(cacheKey);
              if (cached) {
                const { courses, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp < 7 * 24 * 60 * 60 * 1000) {
                  setResults(courses.slice(0, 500));
                  setLoading(false);
                  return;
                }
              }
            } catch {}

            // Fetch from Supabase
            setError(`Loading courses in ${state}...`);
            const res = await fetch(
              `${SURL}/rest/v1/courses?select=id,club_name,city,state,country,number_of_holes,tees&state=eq.${stateAbbr}&limit=500&order=club_name.asc`,
              { headers: { "apikey": SKEY, "Authorization": `Bearer ${SKEY}` } }
            );
            const rows = await res.json();
            const seenKeys = new Set();
            const allCourses = rows.filter(c => {
              const key = (c.club_name + "|" + c.city).toLowerCase();
              if (seenKeys.has(key)) return false;
              seenKeys.add(key);
              return true;
            }).map(c => ({
              id: c.id, club_name: c.club_name, course_name: c.club_name,
              number_of_holes: c.number_of_holes,
              location: { city: c.city, state: c.state },
              tees: typeof c.tees === "string" ? JSON.parse(c.tees) : (c.tees || {})
            }));
            try {
              localStorage.setItem(cacheKey, JSON.stringify({ courses: allCourses, timestamp: Date.now() }));
            } catch {}
            setError("");
            setResults(allCourses.slice(0, 500));
            if (!allCourses.length) setError(`No courses in ${state} yet. Try searching by name.`);

          } else {
            // Name search from Supabase
            const q = query.trim();
            let url = `${SURL}/rest/v1/courses?select=id,club_name,city,state,country,number_of_holes,tees&limit=20&order=club_name.asc`;
            if (country && country !== "United States") url += `&country=eq.${encodeURIComponent(country)}`;
            if (stateAbbr) url += `&state=eq.${stateAbbr}`;
            if (q) url += `&club_name=ilike.${encodeURIComponent("%" + q + "%")}`;

            const res = await fetch(url, { headers: { "apikey": SKEY, "Authorization": `Bearer ${SKEY}` } });
            const rows = await res.json();
            // Group by name+city, keep the one with the largest tees data (real 18-hole)
            const byKey = {};
            for (const c of rows) {
              const key = (c.club_name + "|" + c.city).toLowerCase();
              const teesLen = (c.tees || "").length;
              if (!byKey[key] || teesLen > (byKey[key].tees || "").length) {
                byKey[key] = c;
              }
            }
            const courses = Object.values(byKey).map(c => ({
              id: c.id, club_name: c.club_name, course_name: c.club_name,
              number_of_holes: c.number_of_holes,
              location: {
                city: c.city !== "Unknown" ? c.city : "",
                state: c.state !== "Unknown" ? c.state : "",
                country: c.country !== "Unknown" ? c.country : ""
              },
              tees: typeof c.tees === "string" ? JSON.parse(c.tees) : (c.tees || {})
            }));

            if (courses.length) {
              setResults(courses);
            } else if (q) {
              // Fall back to live API
              const apiQ = q + (country && country !== "United States" ? " " + country : "") + (stateAbbr ? " " + state : "");
              const apiRes = await fetch(`https://golfproxy.vercel.app/api/search?q=${encodeURIComponent(apiQ)}`);
              const apiData = await apiRes.json();
              let apiCourses = apiData.courses || [];
              if (stateAbbr) apiCourses = apiCourses.filter(c => (c.location?.state||"").toUpperCase() === stateAbbr);
              if (country && country !== "United States") {
                apiCourses = apiCourses.filter(c => (c.location?.country||"").toLowerCase().includes(country.toLowerCase().split(" ")[0].toLowerCase()));
              }
              setResults(apiCourses.slice(0, 500));
              if (!apiCourses.length) setError(`No courses found for "${q}"${country ? " in " + country : ""}${state ? ", " + state : ""}. Try a different name.`);
            } else {
              setError(`No courses found${country ? " in " + country : ""}${state ? ", " + state : ""}. Try typing a course name.`);
            }
          }
        } catch (e) {
          setError("Search failed: " + e.message);
        }
        setLoading(false);
      };



            const fetchCourseDetail = async (courseId) => {
        setLoading(true); setError("");
        try {
          const res = await fetch(`https://golfproxy.vercel.app/api/course?id=${courseId}`);
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          // Unwrap course object
        const courseData = data.course || data;
        // If tees is a string (from Supabase), parse it
        if (typeof courseData.tees === "string") {
          try { courseData.tees = JSON.parse(courseData.tees); } catch { courseData.tees = {}; }
        }
        setSelectedCourse(courseData);
        } catch {
          setError("Could not load course details.");
        }
        setLoading(false);
      };

      const applyCoursePars = (course) => {
        let pars = Array(18).fill(4);
        let holes = [];

        // Parse tees if stored as string (from Supabase)
        let tees = course.tees;
        if (typeof tees === "string") {
          try { tees = JSON.parse(tees); } catch { tees = {}; }
        }

        // API structure: tees.male[0].holes or tees.female[0].holes
        if (tees) {
          // Prefer male tees, fall back to female
          const teeGroups = tees.male || tees.female || [];
          if (Array.isArray(teeGroups) && teeGroups.length) {
            // Find true 18-hole tee sets (back 9 differs from front 9)
            const isTrue18 = (t) => {
              if (!t.holes || t.holes.length < 18) return false;
              // Check if back 9 yardages differ from front 9 (not just repeated)
              for (let i = 0; i < 9; i++) {
                if (t.holes[i]?.yardage !== t.holes[i+9]?.yardage) return true;
              }
              return false;
            };
            const true18 = teeGroups.filter(isTrue18);
            const best = true18.length > 0
              ? true18.reduce((a, b) => (b.total_yards || 0) > (a.total_yards || 0) ? b : a)
              : (teeGroups.find(t => t.holes && t.holes.length >= 18) || teeGroups[0]);
            holes = best.holes || [];
          }
        }

        // Fallback: flat holes array
        if (!holes.length && Array.isArray(course.holes)) {
          holes = course.holes;
        }

        if (holes.length) {
          holes.slice(0, 18).forEach((h, i) => {
            const par = Number(h.par || 0);
            if (par >= 3 && par <= 6) pars[i] = par;
          });
        }

        const name = course.club_name || course.course_name || course.name || "Unknown Course";
        onSelectCourse({ name, pars });
        setSelectedCourse(null);
      };

      const applyCustomCourse = (course) => {
        onSelectCourse({ name: course.name, pars: course.pars });
      };

        if (!newCourseName.trim()) return;
        const course = {
          id: Date.now().toString(),
          name: newCourseName.trim(),

        saveCustomCourses([...customCourses, course]);
        setNewCourseName(""); setNewCourseState(""); setNewCoursePars(Array(18).fill(4));
      };

      };

          </div>

          {/* SEARCH TAB */}
          {tab === "search" && (
            <div>
              <select value={country} onChange={e => { setCountry(e.target.value); setState(""); }}
                style={{ ...inputStyle, marginBottom: 8 }}>
                <option value="">All Countries</option>
                {countries.filter(Boolean).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              {(country === "United States" || country === "") && (
                <select value={state} onChange={e => setState(e.target.value)}
                  style={{ ...inputStyle, marginBottom: 8 }}>
                  <option value="">All States</option>
                  {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}

                    localStorage.removeItem("golflog_courses_" + abbrs[state]);

                      flex: 2, padding: "10px", background: "#166534", border: "none",

                      flex: 1, padding: "10px", background: isFav(selectedCourse.id || selectedCourse.club_id) ? "#78350f" : "#1e293b",
                      border: "none", borderRadius: 8,
                      color: isFav(selectedCourse.id || selectedCourse.club_id) ? "#fbbf24" : "#64748b",
                      fontWeight: 700, fontSize: 13, cursor: "pointer",
                    }}>{isFav(selectedCourse.id || selectedCourse.club_id) ? "★ Saved" : "☆ Fav"}</button>
                  </div>
                </div>
              )}

              {/* Results list */}
              {!selectedCourse && results.map((c, i) => (
                <button key={i} onClick={() => {
                    // If we already have tees data from Supabase, use it directly
                    if (c.tees && typeof c.tees === "object" && Object.keys(c.tees).length > 0) {
                      setSelectedCourse(c);
                    } else if (c.tees && typeof c.tees === "string") {
                      try {
                        const parsed = JSON.parse(c.tees);
                        if (Object.keys(parsed).length > 0) {
                          setSelectedCourse({...c, tees: parsed});
                          return;
                        }
                      } catch {}
                      fetchCourseDetail(c.id || c.club_id);
                    } else {
                      fetchCourseDetail(c.id || c.club_id);
                    }
                  }} style={{
                  width: "100%", background: "#0f172a", border: "1px solid #1e293b",
                  borderRadius: 10, padding: "12px 14px", marginBottom: 8,
                  textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",

    // ── SummaryView ──────────────────────────────────────────────────
    function SummaryView({ round }) {
      const played = round.holes.filter(h => h.score !== "");
      if (played.length === 0) return <div style={{ color: "#475569", textAlign: "center", padding: "32px 0", fontSize: 14 }}>Enter scores to see your summary.</div>;
      const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const totalPutts = played.filter(h => h.putts !== "").reduce((s, h) => s + Number(h.putts), 0);
      const fwHoles    = played.filter(h => h.fairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.fairway === "hit").length;
      const girCount   = played.filter(h => h.gir === true).length;
      const diff       = totalScore - totalPar;
      const puttCount  = played.filter(h => h.putts !== "").length;
      const stats = [
        { label: "Score", value: totalScore, sub: diff === 0 ? "Even" : diff > 0 ? `+${diff}` : `${diff}` },
        { label: "Putts", value: puttCount ? totalPutts : "—", sub: puttCount ? `${(totalPutts/puttCount).toFixed(1)}/hole` : "" },
        { label: "FIR", value: fwHoles.length ? `${fwHit}/${fwHoles.length}` : "—", sub: fwHoles.length ? `${Math.round(fwHit/fwHoles.length*100)}%` : "" },
        { label: "GIR", value: played.length ? `${girCount}/${played.length}` : "—", sub: played.length ? `${Math.round(girCount/played.length*100)}%` : "" },
      ];
      const breakdown = { eagle: 0, birdie: 0, par: 0, bogey: 0, double: 0, worse: 0 };
      played.forEach(h => {
        const d = Number(h.score) - Number(h.par);
        if (d <= -2) breakdown.eagle++; else if (d === -1) breakdown.birdie++; else if (d === 0) breakdown.par++; else if (d === 1) breakdown.bogey++; else if (d === 2) breakdown.double++; else breakdown.worse++;
      });
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
            {stats.map(s => (
              <div key={s.label} style={{ background: "#0f172a", borderRadius: 12, padding: "14px 16px", border: "1px solid #1e293b" }}>
                <div style={{ color: "#64748b", fontSize: 11, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>{s.label}</div>
                <div style={{ color: "#f1f5f9", fontSize: 26, fontWeight: 800, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
                <div style={{ color: "#94a3b8", fontSize: 12, marginTop: 2 }}>{s.sub}</div>
              </div>
            ))}
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: "14px 16px", border: "1px solid #1e293b" }}>
            <div style={{ color: "#64748b", fontSize: 11, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Score Breakdown</div>
            {[
              { key: "eagle", label: "Eagle+", color: "#f59e0b" }, { key: "birdie", label: "Birdie", color: "#22c55e" },
              { key: "par", label: "Par", color: "#3b82f6" }, { key: "bogey", label: "Bogey", color: "#f87171" },
              { key: "double", label: "Double", color: "#ef4444" }, { key: "worse", label: "Triple+", color: "#dc2626" },
            ].filter(r => breakdown[r.key] > 0).map(r => (
              <div key={r.key} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: r.color, flexShrink: 0 }} />
                <div style={{ color: "#cbd5e1", fontSize: 13, flex: 1 }}>{r.label}</div>
                <div style={{ background: r.color+"22", color: r.color, borderRadius: 20, padding: "1px 9px", fontSize: 12, fontWeight: 700 }}>{breakdown[r.key]}</div>
                <div style={{ background: "#1e293b", borderRadius: 6, height: 6, flex: 2, overflow: "hidden" }}>
                  <div style={{ width: `${breakdown[r.key]/played.length*100}%`, height: "100%", background: r.color, borderRadius: 6 }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── CHGSSummary ──────────────────────────────────────────────────
    function CHGSSummary({ round }) {
      const played = round.holes.filter(h => h.chgsScore !== "");
      if (played.length === 0) return <div style={{ color: "#475569", textAlign: "center", padding: "32px 0", fontSize: 14 }}>Enter CHGS stats to see your summary.</div>;
      const totalScore = played.reduce((s, h) => s + Number(h.chgsScore), 0);
      const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
      const diff       = totalScore - totalPar;
      const fwHoles    = played.filter(h => h.chgsFairway !== null && h.par !== 3);
      const fwHit      = fwHoles.filter(h => h.chgsFairway === "hit").length;
      const g80plus    = played.filter(h => h.greenPlus80 === true || h.greenPlus80 === false);
      const g80plusHit = g80plus.filter(h => h.greenPlus80 === true).length;
      const g80minus   = played.filter(h => h.greenMinus80 === true || h.greenMinus80 === false);
      const g80minHit  = g80minus.filter(h => h.greenMinus80 === true).length;
      const udHoles    = played.filter(h => h.upAndDown === true || h.upAndDown === false);
      const udMade     = udHoles.filter(h => h.upAndDown === true).length;
      const puttHoles  = played.filter(h => h.chgsPutts !== "");
      const totalPutts = puttHoles.reduce((s, h) => s + Number(h.chgsPutts), 0);
      const cards = [
        { label: "Score", value: totalScore, sub: diff === 0 ? "Even par" : diff > 0 ? `+${diff} over` : `${diff} under`, accent: "#60a5fa" },
        { label: "Fairway", value: fwHoles.length ? `${fwHit}/${fwHoles.length}` : "—", sub: fwHoles.length ? `${Math.round(fwHit/fwHoles.length*100)}% hit` : "", accent: "#4ade80" },
        { label: "Green +80 yds", value: g80plus.length ? `${g80plusHit}/${g80plus.length}` : "—", sub: g80plus.length ? `${Math.round(g80plusHit/g80plus.length*100)}% hit` : "", accent: "#f59e0b" },
        { label: "Green -80 yds", value: g80minus.length ? `${g80minHit}/${g80minus.length}` : "—", sub: g80minus.length ? `${Math.round(g80minHit/g80minus.length*100)}% hit` : "", accent: "#a78bfa" },
        { label: "Up & Down", value: udHoles.length ? `${udMade}/${udHoles.length}` : "—", sub: udHoles.length ? `${Math.round(udMade/udHoles.length*100)}% converted` : "", accent: "#f472b6" },
        { label: "Putts", value: puttHoles.length ? totalPutts : "—", sub: puttHoles.length ? `${(totalPutts/puttHoles.length).toFixed(1)} / hole` : "", accent: "#34d399" },
      ];
      return (
        <div>
          <div style={{ background: "#1e3a5f", borderRadius: 10, padding: "10px 14px", marginBottom: 14, border: "1px solid #1e40af44", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ fontWeight: 800, fontSize: 15, color: "#60a5fa", letterSpacing: "0.04em" }}>CHGS</div>
            <div style={{ color: "#94a3b8", fontSize: 12 }}>Christopher Howard Golf School</div>
            <div style={{ marginLeft: "auto", color: "#f1f5f9", fontWeight: 800, fontSize: 16 }}>
              {totalScore} <span style={{ color: diff < 0 ? "#4ade80" : diff > 0 ? "#f87171" : "#94a3b8", fontSize: 13 }}>({diff === 0 ? "E" : diff > 0 ? "+"+diff : diff})</span>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9 }}>
            {cards.map(c => (
              <div key={c.label} style={{ background: "#0f172a", borderRadius: 12, padding: "13px 14px", border: `1px solid ${c.accent}33` }}>
                <div style={{ color: "#64748b", fontSize: 10, fontWeight: 700, letterSpacing: "0.09em", textTransform: "uppercase" }}>{c.label}</div>
                <div style={{ color: "#f1f5f9", fontSize: 24, fontWeight: 800, lineHeight: 1.1, marginTop: 3 }}>{c.value}</div>
                {c.sub && <div style={{ color: c.accent, fontSize: 11, marginTop: 2, fontWeight: 600 }}>{c.sub}</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────

    const COURSES_KEY = "golflog_custom_courses";
    const FAVORITES_KEY = "golflog_favorites";
    const GOLF_API_KEY = "YQCJTUNPSFW276PCMN7YDJFGIA"; // Replace with your golfcourseapi.com key

    const US_STATES = [
      "Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut",
      "Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa",
      "Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan",
      "Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire",
      "New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio",
      "Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota",

    ];

    function GolfStatsApp() {
      const [rounds, setRounds] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) return JSON.parse(saved);
        } catch {}
        return [defaultRound()];
      });
      const [activeRound, setActiveRound] = useState(0);
      const [view, setView] = useState("scorecard");
      const [activeHalf, setActiveHalf] = useState("front");
      const [chgsTab, setChgsTab] = useState("entry");
      const [showShare, setShowShare] = useState(false);
      const [sharedRound, setSharedRound] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);

      // Save to localStorage whenever rounds change
      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(rounds)); } catch {}
      }, [rounds]);

      // Load shared round from URL
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get("round");
        if (encoded) {
          const r = decodeRound(encoded);
          if (r) {
            // Show shared round in a read-only view, don't merge into saved rounds
            setSharedRound(r);
            setView("shared");
            // Clean the URL so refreshing doesn't re-trigger
            window.history.replaceState({}, "", window.location.pathname);
          }
        }
      }, []);

      const round = rounds[activeRound] || rounds[0];

      const updateHole = (i, updated) => {
        setRounds(rounds.map((r, ri) => ri !== activeRound ? r : { ...r, holes: r.holes.map((h, hi) => hi === i ? updated : h) }));
      };
      const updateRoundMeta = (field, value) => {
        setRounds(rounds.map((r, i) => i === activeRound ? { ...r, [field]: value } : r));
      };
      const addRound = () => {
        const nr = [...rounds, defaultRound()];
        setRounds(nr); setActiveRound(nr.length - 1); setView("scorecard"); setActiveHalf("front");
      };
      const onSelectCourse = ({ name, pars }) => {
        // Apply course name and hole pars to current round
        const updatedHoles = rounds[activeRound].holes.map((h, i) => ({
          ...h, par: pars[i] !== undefined ? pars[i] : h.par,
        }));
        setRounds(rounds.map((r, ri) => ri !== activeRound
          ? r
          : { ...r, course: name, holes: updatedHoles }
        ));
        setView("scorecard");
      };

      const deleteRound = (i) => {
        const nr = rounds.filter((_, ri) => ri !== i);
        const newRounds = nr.length ? nr : [defaultRound()];
        setRounds(newRounds);
        setActiveRound(Math.min(activeRound, newRounds.length - 1));
        setDeleteConfirm(null);
      };

      const holeRange = activeHalf === "front" ? [0, 9] : [9, 18];
      const displayHoles = round.holes.slice(...holeRange);

      const totalScoreStr = (() => {
        const played = round.holes.filter(h => h.score !== "");
        if (!played.length) return "";
        const s = played.reduce((a, h) => a + Number(h.score), 0);

        return `${s} (${d === 0 ? "E" : d > 0 ? "+"+d : d})`;
      })();

        { id: "rounds", label: "Rounds" },
        ...(view === "shared" ? [{ id: "shared", label: "📎 Shared" }] : []),
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#020617", fontFamily: "'Inter', system-ui, sans-serif", color: "#f1f5f9", maxWidth: 430, margin: "0 auto" }}>
          <PrintView round={round} />
          {showShare && <ShareModal
            round={round}
            allRounds={rounds}
            onClose={() => setShowShare(false)}
            onImport={(imported) => {
              const merged = [...rounds];
              imported.forEach(r => {
                const exists = merged.some(m => m.date === r.date && m.course === r.course);
                if (!exists) merged.push(r);
              });
              setRounds(merged);
              setShowShare(false);
            }}
          />}

          {/* Top bar */}
          <div className="no-print" style={{ background: "#020617", position: "sticky", top: 0, zIndex: 10, padding: "16px 16px 0", borderBottom: "1px solid #1e293b" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 22 }}>⛳</span>
                  <span style={{ fontWeight: 800, fontSize: 18, letterSpacing: "-0.02em" }}>GolfLog</span><span style={{ fontSize: 9, color: "#334155", marginLeft: 3 }}>v6</span>
                </div>
                {totalScoreStr && <div style={{ color: "#4ade80", fontWeight: 700, fontSize: 13, marginTop: 1, paddingLeft: 30 }}>{totalScoreStr}</div>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setShowShare(true)} style={{ background: "#1e3a5f", color: "#60a5fa", border: "none", borderRadius: 8, padding: "7px 12px", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>↑ Share</button>
                <button onClick={addRound} style={{ background: "#166534", color: "#4ade80", border: "none", borderRadius: 8, padding: "7px 12px", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>+ New</button>

                    style={{ flex: 1, background: "#0f172a", border: "1px solid #1e293b", borderRadius: 9, padding: "8px 10px", color: "#94a3b8", fontSize: 12, outline: "none", colorScheme: "dark" }} />
                </div>
                <div style={{ display: "flex", background: "#0f172a", borderRadius: 10, border: "1px solid #1e293b", padding: 3, marginBottom: 14 }}>
                  {["front","back"].map(half => (
                    <button key={half} onClick={() => setActiveHalf(half)} style={{
                      flex: 1, border: "none", borderRadius: 8, background: activeHalf === half ? "#166534" : "transparent",
                      color: activeHalf === half ? "#4ade80" : "#64748b", fontWeight: 700, fontSize: 13, padding: "7px 0", cursor: "pointer", transition: "all 0.15s",
                    }}>{half === "front" ? "Front 9 (1–9)" : "Back 9 (10–18)"}</button>
                  ))}
                </div>
                {displayHoles.map((hole, i) => {
                  const holeIndex = holeRange[0] + i;
                  return <HoleCard key={holeIndex} hole={hole} holeNum={holeIndex+1} onChange={u => updateHole(holeIndex, u)} />;
                })}
              </>
            )}

            {view === "summary" && (
              <>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 15 }}>{round.course || "Untitled Round"}</div>
                  <div style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>{round.date}</div>
                </div>
                <SummaryView round={round} />
              </>
            )}

            {view === "chgs" && (
              <>
                <div style={{ display: "flex", background: "#0f172a", borderRadius: 10, border: "1px solid #1e293b", padding: 3, marginBottom: 14 }}>
                  {[{id:"entry",label:"Enter Stats"},{id:"chgssummary",label:"Summary"}].map(t => (
                    <button key={t.id} onClick={() => setChgsTab(t.id)} style={{
                      flex: 1, border: "none", borderRadius: 8, background: chgsTab === t.id ? "#1e3a5f" : "transparent",
                      color: chgsTab === t.id ? "#60a5fa" : "#64748b", fontWeight: 700, fontSize: 13, padding: "7px 0", cursor: "pointer", transition: "all 0.15s",
                    }}>{t.label}</button>
                  ))}
                </div>
                {chgsTab === "entry" && (
                  <>
                    <div style={{ display: "flex", background: "#0f172a", borderRadius: 10, border: "1px solid #1e293b", padding: 3, marginBottom: 14 }}>
                      {["front","back"].map(half => (
                        <button key={half} onClick={() => setActiveHalf(half)} style={{
                          flex: 1, border: "none", borderRadius: 8, background: activeHalf === half ? "#1e3a5f" : "transparent",
                          color: activeHalf === half ? "#60a5fa" : "#64748b", fontWeight: 700, fontSize: 13, padding: "7px 0", cursor: "pointer", transition: "all 0.15s",
                        }}>{half === "front" ? "Front 9 (1–9)" : "Back 9 (10–18)"}</button>
                      ))}
                    </div>
                    {displayHoles.map((hole, i) => {
                      const holeIndex = holeRange[0] + i;
                      return <CHGSHoleCard key={holeIndex} hole={hole} holeNum={holeIndex+1} onChange={u => updateHole(holeIndex, u)} />;
                    })}
                  </>
                )}
                {chgsTab === "chgssummary" && (
                  <>
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 15 }}>{round.course || "Untitled Round"}</div>
                      <div style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>{round.date}</div>
                    </div>
                    <CHGSSummary round={round} />
                  </>
                )}
              </>
            )}

            {view === "courses" && (
              <>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 15 }}>Course Selector</div>
                  <div style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>Search, favorite, or build your own courses. Selecting a course auto-fills hole pars for your current round.</div>
                </div>
                <CoursesTab onSelectCourse={onSelectCourse} />
              </>
            )}

            {view === "shared" && sharedRound && (
              <div>
                <div style={{ background: "#1e3a5f", borderRadius: 12, padding: "12px 14px", marginBottom: 14, border: "1px solid #1e40af44" }}>
                  <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 13, marginBottom: 4 }}>📎 Shared Round</div>
                  <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 15 }}>{sharedRound.course || "Untitled Round"}</div>
                  <div style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>{sharedRound.date}</div>
                  <button onClick={() => {
                    const exists = rounds.some(r => r.date === sharedRound.date && r.course === sharedRound.course);
                    if (!exists) {
                      const nr = [...rounds, sharedRound];
                      setRounds(nr);
                      setActiveRound(nr.length - 1);
                    } else {
                      const idx = rounds.findIndex(r => r.date === sharedRound.date && r.course === sharedRound.course);
                      setActiveRound(idx);
                    }
                    setSharedRound(null);
                    setView("summary");
                  }} style={{
                    marginTop: 10, width: "100%", padding: "9px", borderRadius: 8, border: "none",
                    background: "#166534", color: "#4ade80", fontWeight: 700, fontSize: 13, cursor: "pointer",
                  }}>+ Save to My Rounds</button>
                </div>
                <SummaryView round={sharedRound} />
                {sharedRound.holes.some(h => h.chgsScore !== "") && (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 13, marginBottom: 10, letterSpacing: "0.04em" }}>CHGS STATS</div>
                    <CHGSSummary round={sharedRound} />
                  </div>
                )}
              </div>
            )}

            {view === "rounds" && (
              <>
                <div style={{ color: "#64748b", fontSize: 12, marginBottom: 12, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  Saved Rounds ({rounds.length})
                </div>
                {rounds.map((r, i) => {
                  const played = r.holes.filter(h => h.score !== "");
                  const totalScore = played.reduce((s, h) => s + Number(h.score), 0);
                  const totalPar   = played.reduce((s, h) => s + Number(h.par), 0);
                  const diff = totalScore - totalPar;
                  return (
                    <div key={i} style={{ marginBottom: 8 }}>
                      <div style={{
                        background: i === activeRound ? "#0c2218" : "#0f172a",
                        border: i === activeRound ? "1px solid #166534" : "1px solid #1e293b",
                        borderRadius: 12, overflow: "hidden",
                      }}>
                        <button onClick={() => { setActiveRound(i); setView("scorecard"); }} style={{
                          width: "100%", background: "transparent", border: "none",
                          padding: "14px 16px", textAlign: "left", cursor: "pointer",
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                        }}>
                          <div>
                            <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 14 }}>{r.course || "Untitled Round"}</div>
                            <div style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>{r.date} · {played.length}/18 holes</div>
                          </div>
                          {played.length > 0 && (
                            <div style={{ textAlign: "right" }}>
                              <div style={{ color: "#f1f5f9", fontWeight: 800, fontSize: 20 }}>{totalScore}</div>
                              <div style={{ color: diff < 0 ? "#4ade80" : diff > 0 ? "#f87171" : "#94a3b8", fontSize: 12, fontWeight: 700 }}>
                                {diff === 0 ? "E" : diff > 0 ? "+"+diff : diff}
                              </div>
                            </div>
                          )}
                        </button>
                        <div style={{ borderTop: "1px solid #1e293b", display: "flex" }}>
                          <button onClick={() => { setActiveRound(i); setView("summary"); }} style={{
                            flex: 1, padding: "8px", background: "transparent", border: "none",
                            color: "#64748b", fontSize: 11, fontWeight: 600, cursor: "pointer",
                          }}>📊 Summary</button>
                          <button onClick={() => { setActiveRound(i); setShowShare(true); }} style={{
                            flex: 1, padding: "8px", background: "transparent", border: "none", borderLeft: "1px solid #1e293b",
                            color: "#60a5fa", fontSize: 11, fontWeight: 600, cursor: "pointer",
                          }}>↑ Share</button>
                          <button onClick={() => setDeleteConfirm(i)} style={{
                            flex: 1, padding: "8px", background: "transparent", border: "none", borderLeft: "1px solid #1e293b",
                            color: "#ef4444", fontSize: 11, fontWeight: 600, cursor: "pointer",
                          }}>🗑 Delete</button>
                        </div>
                      </div>
                      {deleteConfirm === i && (
                        <div style={{ background: "#1c0a0a", border: "1px solid #7f1d1d", borderRadius: 10, padding: "12px 14px", marginTop: 6 }}>
                          <div style={{ color: "#f87171", fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Delete this round? This cannot be undone.</div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={() => deleteRound(i)} style={{ flex: 1, padding: "8px", background: "#7f1d1d", border: "none", borderRadius: 8, color: "#fca5a5", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Yes, Delete</button>
                            <button onClick={() => setDeleteConfirm(null)} style={{ flex: 1, padding: "8px", background: "#1e293b", border: "none", borderRadius: 8, color: "#94a3b8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GolfStatsApp />);
  </script>
</body>
</html>
